<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal OS — samudoescode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --desktop-bg: #0f1923;
      --desktop-grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      --taskbar-bg: rgba(10, 16, 24, 0.92);
      --menubar-bg: rgba(10, 16, 24, 0.88);
      --win-border: rgba(255,255,255,0.08);
      --accent-professional: #3b82f6;
      --accent-physical: #22c55e;
      --accent-social: #f59e0b;
      --accent-emotional: #ec4899;
      --accent-misc: #a855f7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', serif;
      background-color: var(--desktop-bg);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      cursor: default;
    }

    /* ── Desktop ── */
    #desktop {
      position: fixed;
      inset: 28px 0 48px 0;
      overflow: hidden;
    }

    /* Background wallpaper with grain */
    #desktop::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(59,130,246,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168,85,247,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(236,72,153,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    #desktop::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4t5eXlzc3OLi4ubm5uVlZWPj4+NjY19fX2JiYl/f39ra2uRkZGZmZlpaWmXl5dvb29xcXGTk5NnZ2c4zIRNAAAAG3RSTlNAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEB6MFGrAAABIElEQVR42u3VyQ6CMABF4UUBEQXcl7n/fypFbBJqpZuHbDp3cJJvepveTilFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFURRFkc0H1bwCYyLbHF4AAAAASUVORK5CYII=");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Menu Bar (top) ── */
    #menubar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: var(--menubar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--win-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      z-index: 9999;
      gap: 22px;
    }
    #menubar .brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: #e2e8f0;
      letter-spacing: 0.05em;
    }
    #menubar .menu-items {
      display: flex;
      gap: 16px;
    }
    #menubar .menu-items span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(226,232,240,0.55);
      cursor: pointer;
      transition: color 0.15s;
    }
    #menubar .menu-items span:hover { color: #e2e8f0; }
    #menubar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #menubar-clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(226,232,240,0.7);
    }

    /* ── Taskbar (bottom) ── */
    #taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: var(--taskbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--win-border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 9999;
      gap: 8px;
    }
    .taskbar-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(226,232,240,0.6);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 160px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .taskbar-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
    }
    .taskbar-btn.active {
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.1);
      color: #e2e8f0;
    }
    .taskbar-btn .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #taskbar-right {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(226,232,240,0.45);
    }

    /* ── Desktop Icons ── */
    .desktop-icons {
      position: relative;
      z-index: 1;
      padding: 32px;
      width: 100%;
      height: 100%;
    }
    .desk-icon {
      position: absolute;
      width: 88px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 10px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .desk-icon:hover { background: rgba(255,255,255,0.06); }
    .desk-icon:active { background: rgba(255,255,255,0.1); transform: scale(0.97); }
    .desk-icon.selected { background: rgba(255,255,255,0.08); }
    .desk-icon.dragging {
      cursor: grabbing;
      transform: none;
      background: rgba(255,255,255,0.12);
    }
    .folder-icon {
      width: 52px;
      height: 44px;
      position: relative;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .folder-tab {
      position: absolute;
      top: 0; left: 4px;
      width: 22px; height: 9px;
      border-radius: 4px 4px 0 0;
    }
    .folder-body {
      position: absolute;
      bottom: 0; left: 0;
      width: 52px; height: 36px;
      border-radius: 3px 6px 5px 5px;
    }
    .folder-shine {
      position: absolute;
      top: 10px; left: 4px;
      width: 44px; height: 12px;
      border-radius: 2px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    }
    .desk-icon span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(226,232,240,0.9);
      text-align: center;
      line-height: 1.3;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      max-width: 80px;
    }

    /* ── Windows ── */
    .os-window {
      position: absolute;
      background: #f8f7f4;
      border-radius: 10px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.18),
        0 8px 40px rgba(0,0,0,0.5),
        0 2px 8px rgba(0,0,0,0.3);
      overflow: hidden;
      min-width: 380px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s;
    }
    .os-window.focused {
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.22),
        0 20px 60px rgba(0,0,0,0.65),
        0 4px 16px rgba(0,0,0,0.35);
    }
    .os-window.minimized { display: none; }
    .os-window.animating-in {
      animation: windowOpen 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes windowOpen {
      from { opacity: 0; transform: scale(0.88); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Title bar */
    .win-titlebar {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: grab;
      flex-shrink: 0;
      position: relative;
    }
    .win-titlebar:active { cursor: grabbing; }
    .win-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .win-btn {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.1s;
      position: relative;
    }
    .win-btn:hover { filter: brightness(1.15); }
    .win-btn-close { background: #ff5f57; }
    .win-btn-min { background: #ffbd2e; }
    .win-btn-max { background: #28c840; }
    .win-btn svg { opacity: 0; transition: opacity 0.1s; width: 7px; height: 7px; }
    .win-controls:hover .win-btn svg { opacity: 1; }
    .win-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      font-weight: 500;
      color: rgba(15,25,35,0.75);
      white-space: nowrap;
      pointer-events: none;
    }
    .win-icon-sm {
      margin-left: auto;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Sidebar */
    .win-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .win-sidebar {
      width: 180px;
      background: #eeece8;
      border-right: 1px solid rgba(0,0,0,0.07);
      padding: 12px 0;
      flex-shrink: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-section {
      padding: 4px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      color: rgba(15,25,35,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .sidebar-item {
      padding: 7px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(15,25,35,0.65);
      cursor: pointer;
      border-radius: 5px;
      margin: 0 6px;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .sidebar-item:hover {
      background: rgba(0,0,0,0.05);
      color: rgba(15,25,35,0.85);
    }
    .sidebar-item.active {
      color: rgba(15,25,35,0.9);
    }
    .sidebar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Content area */
    .win-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      background: #f8f7f4;
    }
    .win-content::-webkit-scrollbar { width: 6px; }
    .win-content::-webkit-scrollbar-track { background: transparent; }
    .win-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

    /* Entry card */
    .entry-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .entry-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(15,25,35,0.4);
      flex-shrink: 0;
    }
    .entry-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .entry-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: #0f1923;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .entry-body {
      font-family: 'Lora', serif;
      font-size: 13.5px;
      line-height: 1.75;
      color: rgba(15,25,35,0.72);
    }
    .entry-body em {
      font-style: italic;
      color: rgba(15,25,35,0.55);
    }
    .entry-divider {
      height: 1px;
      background: rgba(0,0,0,0.07);
      margin: 22px 0;
    }
    .entry-card {
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.05);
    }

    /* Status bar */
    .win-statusbar {
      height: 24px;
      background: #eeece8;
      border-top: 1px solid rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      flex-shrink: 0;
    }
    .status-item {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      color: rgba(15,25,35,0.4);
    }

    /* Resize handle */
    .win-resize {
      position: absolute;
      right: 0; bottom: 0;
      width: 18px; height: 18px;
      cursor: se-resize;
    }
    .win-resize::after {
      content: '';
      position: absolute;
      right: 4px; bottom: 4px;
      width: 10px; height: 10px;
      border-right: 2px solid rgba(0,0,0,0.2);
      border-bottom: 2px solid rgba(0,0,0,0.2);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      opacity: 0.4;
    }
    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(15,25,35,0.6);
    }

    /* Boot animation */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: #0f1923;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    #boot-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .boot-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      color: #e2e8f0;
      letter-spacing: -0.01em;
    }
    .boot-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(226,232,240,0.4);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .boot-bar-wrap {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 8px;
    }
    .boot-bar {
      height: 100%;
      background: rgba(226,232,240,0.4);
      border-radius: 1px;
      animation: bootLoad 1.8s ease forwards;
    }
    @keyframes bootLoad {
      0% { width: 0; }
      60% { width: 70%; }
      100% { width: 100%; }
    }

    /* Right-click context menu */
    #ctx-menu {
      position: fixed;
      background: rgba(20,28,38,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px;
      z-index: 99998;
      min-width: 170px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .ctx-item {
      padding: 7px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(226,232,240,0.75);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-item:hover {
      background: rgba(255,255,255,0.07);
      color: #e2e8f0;
    }
    .ctx-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 4px 0;
    }
  </style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot-screen">
  <div class="boot-logo">Journal OS</div>
  <div class="boot-sub">samudoescode · DTU IxD</div>
  <div class="boot-bar-wrap"><div class="boot-bar"></div></div>
</div>

<!-- Menu Bar -->
<div id="menubar">
  <div class="brand">⬛ Journal OS</div>
  <div class="menu-items">
    <span onclick="openAllWindows()">File</span>
    <span>Edit</span>
    <span onclick="arrangeWindows()">View</span>
    <span onclick="closeAllWindows()">Window</span>
    <span>Help</span>
  </div>
  <div id="menubar-right">
    <span id="menubar-clock" class="menubar-clock"></span>
  </div>
</div>

<!-- Desktop -->
<div id="desktop">
  <div class="desktop-icons">
    <div class="desk-icon" ondblclick="openWindow('professional')" onclick="selectIcon(this)">
      <div class="folder-icon">
        <div class="folder-tab" style="background:#2563eb;"></div>
        <div class="folder-body" style="background:linear-gradient(160deg,#3b82f6,#2563eb);"></div>
        <div class="folder-shine"></div>
      </div>
      <span>Professional</span>
    </div>

    <div class="desk-icon" ondblclick="openWindow('physical')" onclick="selectIcon(this)">
      <div class="folder-icon">
        <div class="folder-tab" style="background:#16a34a;"></div>
        <div class="folder-body" style="background:linear-gradient(160deg,#22c55e,#16a34a);"></div>
        <div class="folder-shine"></div>
      </div>
      <span>Physical</span>
    </div>

    <div class="desk-icon" ondblclick="openWindow('social')" onclick="selectIcon(this)">
      <div class="folder-icon">
        <div class="folder-tab" style="background:#d97706;"></div>
        <div class="folder-body" style="background:linear-gradient(160deg,#f59e0b,#d97706);"></div>
        <div class="folder-shine"></div>
      </div>
      <span>Social</span>
    </div>

    <div class="desk-icon" ondblclick="openWindow('emotional')" onclick="selectIcon(this)">
      <div class="folder-icon">
        <div class="folder-tab" style="background:#be185d;"></div>
        <div class="folder-body" style="background:linear-gradient(160deg,#ec4899,#be185d);"></div>
        <div class="folder-shine"></div>
      </div>
      <span>Emotional</span>
    </div>

    <div class="desk-icon" ondblclick="openWindow('misc')" onclick="selectIcon(this)">
      <div class="folder-icon">
        <div class="folder-tab" style="background:#7c3aed;"></div>
        <div class="folder-body" style="background:linear-gradient(160deg,#a855f7,#7c3aed);"></div>
        <div class="folder-shine"></div>
      </div>
      <span>Class Notes</span>
    </div>
  </div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <div id="taskbar-apps" style="display:flex;gap:8px;align-items:center;"></div>
  <div id="taskbar-right">DTU · IxD · 2025</div>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="openAllWindows();hideCtx()">Open All Folders</div>
  <div class="ctx-item" onclick="arrangeWindows();hideCtx()">Arrange Windows</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" onclick="closeAllWindows();hideCtx()">Close All Windows</div>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const sections = {
  professional: {
    label: 'Professional',
    icon: '💼',
    color: '#3b82f6',
    colorDark: '#2563eb',
    entries: [
      {
        id: 'figma-basics',
        date: 'Week 01 · Apr 2025',
        tag: 'UI/UX',
        title: 'Getting Comfortable with Figma',
        body: `Started the semester with zero Figma knowledge beyond basic shapes. This week I completed the official Figma foundations course and rebuilt three screens from a mobile app I use daily — purely from observation. The process of <em>deconstructing</em> existing design taught me more about component thinking than any tutorial.`,
      },
      {
        id: 'html-css',
        date: 'Week 02 · Apr 2025',
        tag: 'Frontend',
        title: 'HTML & CSS: Beyond the Basics',
        body: `Worked through CSS Grid and Flexbox layouts in depth. Built a responsive card layout from scratch without any framework. The breakthrough moment was understanding the difference between grid areas and named lines — suddenly complex layouts became intuitive.`,
      },
      {
        id: 'js-dom',
        date: 'Week 03 · Apr 2025',
        tag: 'Frontend',
        title: 'JavaScript DOM Manipulation',
        body: `Built a small interactive prototype using vanilla JS — no libraries. Focused on event delegation, state management patterns, and the difference between imperative and declarative thinking. This is where code starts feeling like design.`,
      },
    ],
  },
  physical: {
    label: 'Physical',
    icon: '🏃',
    color: '#22c55e',
    colorDark: '#16a34a',
    entries: [
      {
        id: 'running-start',
        date: 'Week 01 · Apr 2025',
        tag: 'Cardio',
        title: 'Restarting a Running Habit',
        body: `Set a goal: run 3x per week, minimum 3km each session. Week one was humbling — stopped at 2.1km on day one. But I noticed that the mental resistance before starting was harder than the run itself. <em>Habit stacking</em>: tied running shoes to leaving the house for any reason.`,
      },
      {

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const openWindows = {};
let zCounter = 100;

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('boot-screen').classList.add('hidden');
  }, 2200);
  updateClock();
  initDesktopIcons();
  setInterval(updateClock, 1000);
});

function updateClock() {
  const now = new Date();
  const opts = { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12: false };
  document.getElementById('menubar-clock').textContent = now.toLocaleString('en-GB', opts);
}

// ─────────────────────────────────────────
// ICON SELECTION
// ─────────────────────────────────────────
function selectIcon(el) {
  document.querySelectorAll('.desk-icon').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}
document.getElementById('desktop').addEventListener('click', e => {
  if (e.target === document.getElementById('desktop') || e.target.classList.contains('desktop-icons')) {
    document.querySelectorAll('.desk-icon').forEach(d => d.classList.remove('selected'));
  }
});

function initDesktopIcons() {
  const iconContainer = document.querySelector('.desktop-icons');
  if (!iconContainer) return;

  const icons = Array.from(iconContainer.querySelectorAll('.desk-icon'));
  const iconW = 88;
  const iconH = 100;
  const gap = 8;
  const containerW = iconContainer.clientWidth;
  const cols = Math.max(1, Math.floor((containerW - 64 + gap) / (iconW + gap)));

  icons.forEach((icon, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    icon.style.left = (col * (iconW + gap)) + 'px';
    icon.style.top = (row * (iconH + gap)) + 'px';
    makeIconDraggable(icon, iconContainer);
  });
}

function makeIconDraggable(icon, container) {
  let startX, startY, startLeft, startTop;
  let moved = false;

  icon.addEventListener('mousedown', e => {
    if (e.button !== 0) return;

    selectIcon(icon);
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseInt(icon.style.left, 10) || 0;
    startTop = parseInt(icon.style.top, 10) || 0;
    moved = false;

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag, { once: true });
  });

  function onDrag(e) {
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      moved = true;
      icon.classList.add('dragging');
    }

    if (!moved) return;

    const maxLeft = Math.max(0, container.clientWidth - icon.offsetWidth);
    const maxTop = Math.max(0, container.clientHeight - icon.offsetHeight);
    const nextLeft = Math.max(0, Math.min(maxLeft, startLeft + dx));
    const nextTop = Math.max(0, Math.min(maxTop, startTop + dy));

    icon.style.left = nextLeft + 'px';
    icon.style.top = nextTop + 'px';
  }

  function stopDrag() {
    document.removeEventListener('mousemove', onDrag);
    icon.classList.remove('dragging');
  }
}

// ─────────────────────────────────────────
// WINDOW MANAGEMENT
// ─────────────────────────────────────────
function openWindow(sectionId) {
  if (openWindows[sectionId]) {
    const win = openWindows[sectionId].el;
    if (win.classList.contains('minimized')) {
      win.classList.remove('minimized');
      updateTaskbar();
    }
    focusWindow(sectionId);
    return;
  }

  const section = sections[sectionId];
  const desktop = document.getElementById('desktop');
  const rect = desktop.getBoundingClientRect();

  const win = document.createElement('div');
  win.className = 'os-window focused animating-in';
  win.style.width = '680px';
  win.style.height = '480px';
  win.style.left = (80 + Object.keys(openWindows).length * 28) + 'px';
  win.style.top = (40 + Object.keys(openWindows).length * 24) + 'px';
  win.style.zIndex = ++zCounter;

  // Sidebar items
  const sidebarItems = section.entries.map((e, i) => `
    <div class="sidebar-item ${i===0?'active':''}" onclick="showEntry('${sectionId}','${e.id}',this)" data-id="${e.id}">
      <div class="sidebar-dot" style="background:${section.color};opacity:0.7;"></div>
      ${e.title.length > 22 ? e.title.slice(0,22)+'…' : e.title}
    </div>
  `).join('');

  win.innerHTML = `
    <div class="win-titlebar" style="background:linear-gradient(135deg,${section.color}22,${section.colorDark}18);">
      <div class="win-controls">
        <button class="win-btn win-btn-close" onclick="closeWindow('${sectionId}')">
          <svg viewBox="0 0 7 7" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1L6 6M6 1L1 6" stroke="#7a1a0a" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button class="win-btn win-btn-min" onclick="minimizeWindow('${sectionId}')">
          <svg viewBox="0 0 7 7" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="3.5" x2="6" y2="3.5" stroke="#7a5f00" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button class="win-btn win-btn-max" onclick="maximizeWindow('${sectionId}')">
          <svg viewBox="0 0 7 7" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="5" height="5" rx="0.8" stroke="#0a520a" stroke-width="1.1"/></svg>
        </button>
      </div>
      <div class="win-title">${section.icon} ${section.label}</div>
    </div>
    <div class="win-body">
      <div class="win-sidebar">
        <div class="sidebar-section">Entries</div>
        ${sidebarItems}
        <div class="sidebar-section" style="margin-top:auto;">Info</div>
        <div class="sidebar-item" style="pointer-events:none;opacity:0.5;">${section.entries.length} entries</div>
      </div>
      <div class="win-content" id="content-${sectionId}">
        ${renderEntry(sectionId, section.entries[0].id)}
      </div>
    </div>
    <div class="win-statusbar">
      <span class="status-item">${section.label}</span>
      <span class="status-item">${section.entries.length} items</span>
      <span class="status-item" style="margin-left:auto;">Journal OS v1.0</span>
    </div>
    <div class="win-resize"></div>
  `;

  desktop.appendChild(win);
  openWindows[sectionId] = { el: win, section };

  win.addEventListener('mousedown', () => focusWindow(sectionId));
  makeDraggable(win, win.querySelector('.win-titlebar'));
  makeResizable(win, win.querySelector('.win-resize'));

  setTimeout(() => win.classList.remove('animating-in'), 300);
  updateTaskbar();
  defocusAll();
  win.classList.add('focused');
}

function renderEntry(sectionId, entryId) {
  const section = sections[sectionId];
  const entry = section.entries.find(e => e.id === entryId);
  if (!entry) return '';
  return `
    <div style="margin-bottom:6px;">
      <div class="entry-header">
        <span class="entry-date">${entry.date}</span>
        <span class="entry-tag" style="background:${section.color}20;color:${section.colorDark};">${entry.tag}</span>
      </div>
      <div class="entry-title">${entry.title}</div>
      <div class="entry-body">${entry.body}</div>
    </div>
    <div class="entry-divider"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${section.entries.filter(e=>e.id!==entryId).map(e=>`
        <div onclick="showEntryById('${sectionId}','${e.id}')" style="cursor:pointer;padding:8px 12px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.06);border-radius:6px;flex:1;min-width:140px;">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(15,25,35,0.38);margin-bottom:3px;">${e.date}</div>
          <div style="font-family:'DM Serif Display',serif;font-size:13px;color:#0f1923;line-height:1.3;">${e.title}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function showEntry(sectionId, entryId, el) {
  document.querySelectorAll(`#win-${sectionId} .sidebar-item`).forEach(i=>i.classList.remove('active'));
  if (el) {
    el.classList.add('active');
    // also update via container
    el.closest('.win-body').querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
    el.classList.add('active');
  }
  const content = document.getElementById('content-' + sectionId);
  if (content) {
    content.style.opacity = '0';
    setTimeout(() => {
      content.innerHTML = renderEntry(sectionId, entryId);
      content.style.opacity = '1';
      content.style.transition = 'opacity 0.2s';
    }, 80);
  }
}

function showEntryById(sectionId, entryId) {
  const win = openWindows[sectionId]?.el;
  if (!win) return;
  win.querySelectorAll('.sidebar-item').forEach(i => {
    i.classList.toggle('active', i.dataset.id === entryId);
  });
  const content = document.getElementById('content-' + sectionId);
  if (content) {
    content.style.opacity = '0';
    setTimeout(() => {
      content.innerHTML = renderEntry(sectionId, entryId);
      content.style.transition = 'opacity 0.2s';
      content.style.opacity = '1';
    }, 80);
  }
}

function closeWindow(sectionId) {
  if (!openWindows[sectionId]) return;
  const win = openWindows[sectionId].el;
  win.style.transition = 'opacity 0.15s, transform 0.15s';
  win.style.opacity = '0';
  win.style.transform = 'scale(0.94)';
  setTimeout(() => {
    win.remove();
    delete openWindows[sectionId];
    updateTaskbar();
  }, 150);
}

function minimizeWindow(sectionId) {
  openWindows[sectionId].el.classList.toggle('minimized');
  updateTaskbar();
}

function maximizeWindow(sectionId) {
  const win = openWindows[sectionId].el;
  if (win.dataset.maximized) {
    win.style.left = win.dataset.ox;
    win.style.top = win.dataset.oy;
    win.style.width = win.dataset.ow;
    win.style.height = win.dataset.oh;
    delete win.dataset.maximized;
  } else {
    win.dataset.ox = win.style.left;
    win.dataset.oy = win.style.top;
    win.dataset.ow = win.style.width;
    win.dataset.oh = win.style.height;
    win.style.left = '0';
    win.style.top = '0';
    win.style.width = '100%';
    win.style.height = '100%';
    win.dataset.maximized = '1';
  }
}

function focusWindow(sectionId) {
  defocusAll();
  if (openWindows[sectionId]) {
    openWindows[sectionId].el.classList.add('focused');
    openWindows[sectionId].el.style.zIndex = ++zCounter;
  }
  updateTaskbar();
}

function defocusAll() {
  Object.values(openWindows).forEach(w => w.el.classList.remove('focused'));
}

function openAllWindows() {
  Object.keys(sections).forEach((k, i) => setTimeout(() => openWindow(k), i * 100));
}

function closeAllWindows() {
  Object.keys(openWindows).forEach(k => closeWindow(k));
}

function arrangeWindows() {
  const keys = Object.keys(openWindows);
  const cols = Math.ceil(Math.sqrt(keys.length));
  const desktop = document.getElementById('desktop');
  const W = desktop.clientWidth;
  const H = desktop.clientHeight;
  const ww = Math.floor(W / cols) - 16;
  const wh = Math.floor(H / Math.ceil(keys.length / cols)) - 16;
  keys.forEach((k, i) => {
    const win = openWindows[k].el;
    win.classList.remove('minimized');
    const col = i % cols;
    const row = Math.floor(i / cols);
    win.style.left = (col * (ww + 16) + 8) + 'px';
    win.style.top = (row * (wh + 16) + 8) + 'px';
    win.style.width = ww + 'px';
    win.style.height = wh + 'px';
  });
  updateTaskbar();
}

// ─────────────────────────────────────────
// TASKBAR
// ─────────────────────────────────────────
function updateTaskbar() {
  const bar = document.getElementById('taskbar-apps');
  bar.innerHTML = '';
  Object.entries(openWindows).forEach(([id, data]) => {
    const sec = sections[id];
    const btn = document.createElement('div');
    btn.className = 'taskbar-btn' + (data.el.classList.contains('focused') ? ' active' : '');
    btn.innerHTML = `<div class="dot" style="background:${sec.color};"></div>${sec.icon} ${sec.label}`;
    btn.onclick = () => {
      if (data.el.classList.contains('minimized')) {
        data.el.classList.remove('minimized');
        focusWindow(id);
      } else if (data.el.classList.contains('focused')) {
        minimizeWindow(id);
      } else {
        focusWindow(id);
      }
    };
    bar.appendChild(btn);
  });
}

// ─────────────────────────────────────────
// DRAGGING
// ─────────────────────────────────────────
function makeDraggable(win, handle) {
  let startX, startY, startLeft, startTop;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseInt(win.style.left) || 0;
    startTop = parseInt(win.style.top) || 0;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag, {once:true});
  });
  function onDrag(e) {
    if (win.dataset.maximized) return;
    win.style.left = Math.max(0, startLeft + e.clientX - startX) + 'px';
    win.style.top = Math.max(0, startTop + e.clientY - startY) + 'px';
  }
  function stopDrag() {
    document.removeEventListener('mousemove', onDrag);
  }
}

// ─────────────────────────────────────────
// RESIZING
// ─────────────────────────────────────────
function makeResizable(win, handle) {
  handle.addEventListener('mousedown', e => {
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const startW = win.offsetWidth, startH = win.offsetHeight;
    function onResize(e) {
      win.style.width = Math.max(380, startW + e.clientX - startX) + 'px';
      win.style.height = Math.max(260, startH + e.clientY - startY) + 'px';
    }
    document.addEventListener('mousemove', onResize);
    document.addEventListener('mouseup', () => document.removeEventListener('mousemove', onResize), {once:true});
  });
}

// ─────────────────────────────────────────
// CONTEXT MENU
// ─────────────────────────────────────────
document.getElementById('desktop').addEventListener('contextmenu', e => {
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
});
document.addEventListener('click', hideCtx);
function hideCtx() {
  document.getElementById('ctx-menu').style.display = 'none';
}

// Keyboard shortcut: Escape to deselect
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.desk-icon').forEach(d => d.classList.remove('selected'));
    hideCtx();
  }
});
