<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal OS — Saumya</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #c7d8c6;   /* surface: taskbar, windows, titlebar */
      --accent: #f34e3c;   /* accent:  text, button bg, icons     */
      --cream:  #f5f5db;   /* desktop grid background             */
      --cursor-custom: url("file:///C:/Users/LENOVO/.cursor/projects/c-Users-LENOVO-Desktop-samudoescode-github-io/assets/c__Users_LENOVO_AppData_Roaming_Cursor_User_workspaceStorage_15ea55404aa38275418093e8b5fd0673_images_Cursors-f456efbd-5a63-4bb6-b65e-ad0abdabb49b.png") 2 2;
      --g0:     #ffffff;
      --g1:     #dfdfdf;
      --g2:     #c7d8c6;   /* keep --g2 alias for legacy refs     */
      --g3:     #808080;
      --g4:     #0a0a0a;

      /* ── Shadow tokens ── */
      --shadow-window-outer: 4px 4px 0 rgba(0,0,0,0.4);
      --shadow-window-inner: inset -4px -4px 0 rgba(0,0,0,0.4);
      --shadow-raised: inset -2px -2px 0 rgba(0,0,0,0.4), inset 2px 2px 0 rgba(255,255,255,0.6);
      --shadow-sunken: inset -2px -2px 0 rgba(255,255,255,0.5), inset 2px 2px 0 rgba(0,0,0,0.35);
      --shadow-clock:  inset 2px 2px 0 rgba(0,0,0,0.25), inset -2px -2px 0 rgba(255,255,255,0.6);
      /* Control buttons (–□✕) outer drop + inner */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      overflow: hidden;
      height: 100vh; width: 100vw;
      cursor: var(--cursor-custom), default;
      user-select: none;
    }
    a, button, .desk-icon, .tb-btn, .start-btn, .bar-btn, .wc-btn, .sb-item, .ctx-i, .cal-day, .win-resize, #hue-slider {
      cursor: var(--cursor-custom), pointer !important;
    }

    /* ── DESKTOP ── */
    #desktop {
      position: fixed;
      inset: 0 0 58px 0;
      overflow: hidden;
      background-color: var(--cream);
      background-image:
        linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 29px 29px;
    }

    /* ── DESKTOP ICONS ── */
    .desk-icon {
      position: absolute;
      width: 80px;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      padding: 8px 4px; border-radius: 4px; cursor: pointer;
    }
    .desk-icon:hover    { background: var(--desk-hover); }
    .desk-icon.selected { background: var(--desk-sel); outline: 1px dotted #888; }
    .desk-icon.dragging { opacity: 0.75; cursor: grabbing; z-index: 8000 !important; }
    .desk-icon .fi {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; pointer-events: none;
    }
    .desk-icon span {
      font-size: 11px; color: #1a1a1a;
      text-align: center; line-height: 1.2;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.85);
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       TASKBAR  — Figma node 29-3635
    ══════════════════════════════════════ */
    #taskbar {
      position: fixed;
      bottom: 4px; left: 4px; right: 4px;
      height: 50px;
      background: var(--bg);
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.4);
      border-radius: 12px;
      display: flex; align-items: center;
      padding: 3px; gap: 3px; z-index: 9999;
    }

    /* Start button — Figma node 29-3637
       shadow: inset -2px -2px 0 rgba(0,0,0,0.4), inset 2px 2px 0 white */
    .start-btn {
      height: 44px; padding: 0 14px;
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      border-radius: 8px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; flex-shrink: 0;
      font-size: 15px; font-weight: 700;
      color: var(--accent);
    }
    .start-btn:active {
      box-shadow: var(--shadow-sunken);
    }

    .taskbar-apps { display: flex; gap: 3px; flex: 1; min-width: 0; }

    /* Taskbar app buttons — Figma node 29-3642 (sunken/open state)
       shadow: inset -2px -2px 0 rgba(255,255,255,0.7), inset 2px 2px 0 rgba(0,0,0,0.4) */
    .tb-btn {
      height: 44px; padding: 0 10px;
      background: var(--bg);
      box-shadow: var(--shadow-sunken);
      border-radius: 8px;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 12px; font-weight: 700;
      white-space: nowrap; overflow: hidden;
      max-width: 180px; text-overflow: ellipsis;
      color: var(--accent);
    }
    /* Focused / raised state — flip to raised */
    .tb-btn.active {
      box-shadow: var(--shadow-raised);
      background: var(--bg);
    }
    .tb-btn .fi { font-size: 16px; flex-shrink: 0; }

    /* Thin divider between taskbar sections */
    .tb-divider {
      width: 1px; height: 32px;
      background: rgba(0,0,0,0.2);
      flex-shrink: 0; margin: 0 2px;
    }

    /* Accent slider strip */
    .taskbar-accent {
      height: 44px;
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px;
      background: var(--g2);
      box-shadow: var(--shadow-sunken);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .taskbar-accent label {
      font-size: 11px; font-weight: 700;
      color: var(--accent); white-space: nowrap;
    }

    /* Clock — Figma node 29-3652
       rounded: tl 8 tr 8 bl 8 br 12
       shadow:  inset 2px 2px 0 rgba(0,0,0,0.25), inset -2px -2px 0 rgba(255,255,255,0.7) */
    .tb-clock {
      height: 44px; padding: 0 16px;
      background: var(--bg);
      box-shadow: var(--shadow-clock);
      border-radius: 8px 8px 8px 12px;
      display: flex; align-items: center;
      font-size: 20px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       WINDOW SHELL — Figma node 29-3615
       outer: 4px 4px 0 rgba(0,0,0,0.4)
       inner overlay: inset -4px -4px 0 rgba(0,0,0,0.4)
    ══════════════════════════════════════ */
    .os-window {
      position: absolute;
      min-width: 340px; min-height: 220px;
      background: var(--bg);
      border-radius: 8px;
      box-shadow: var(--shadow-window-outer), var(--shadow-window-inner);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .os-window.minimized { display: none !important; }
    @keyframes winOpen {
      from { opacity:0; transform:scale(0.88) translateY(8px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .win-open-anim { animation: winOpen 0.14s cubic-bezier(.34,1.4,.64,1) forwards; }

    /* ── TITLEBAR — Figma node 29-3617 ── */
    .win-tb {
      height: 48px;
      background: var(--bg);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      flex-shrink: 0; cursor: grab;
    }
    .win-tb:active { cursor: grabbing; }

    /* Title text — Figma: text-[#f34e3c] i.e. accent color */
    .win-tb-inner {
      flex: 1; height: 48px;
      display: flex; align-items: center;
      justify-content: space-between;
      background: transparent;
    }
    .win-tb-title {
      font-size: 22px; font-weight: 700;
      color: var(--accent);
      pointer-events: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: opacity 0.15s;
    }
    .win-tb-inner.inactive .win-tb-title { opacity: 0.35; }

    /* Control buttons — Figma nodes 29-3622/3625/3628
       bg: accent color  |  rounded: 3px
       shadow: 2px 2px 0 rgba(0,0,0,0.4)          ← outer drop
               inset -2px -2px 0 rgba(0,0,0,0.4)  ← inner bottom-right
               inset 1px 1px 0 white               ← inner top-left highlight */
    .win-ctrls { display: flex; gap: 3px; }
    .wc-btn {
      width: 29px; height: 26px;
      background: var(--accent);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
      border: none; cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
      color: var(--bg);  /* bg-on-accent always readable */
      line-height: 1; flex-shrink: 0;
    }
    .wc-btn:active {
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.5);
      transform: translate(1px, 1px);
    }

    /* ── TOOLBAR strip ── */
    .win-bar {
      height: 28px; background: var(--g2);
      border-bottom: 1px solid rgba(0,0,0,0.12);
      display: flex; align-items: center;
      padding: 0 4px; gap: 2px; flex-shrink: 0;
    }
    .bar-btn {
      height: 22px; padding: 0 10px; font-size: 12px;
      background: var(--bg);
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2), inset 1px 1px 0 rgba(255,255,255,0.6);
      border: none; cursor: pointer; color: var(--accent);
      border-radius: 3px;
    }
    .bar-btn:active {
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.25);
      transform: translate(1px,1px);
    }

    /* ── BODY: sidebar + content ── */
    .win-body { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .win-sb {
      width: 168px; background: var(--bg);
      border-right: 1px solid rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      padding: 4px 0; flex-shrink: 0; overflow-y: auto;
    }
    .sb-section {
      font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.45);
      padding: 8px 10px 3px;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .sb-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; font-size: 12px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #000; border-radius: 4px; margin: 0 4px;
    }
    .sb-item .fi { font-size: 14px; flex-shrink: 0; }
    .sb-item:hover  { background: var(--accent); color: var(--bg); }
    .sb-item.active { background: var(--accent); color: var(--bg); }

    /* Content pane */
    .win-ct {
      flex: 1; background: var(--content-bg, #f0f0f0);
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.12);
      overflow-y: auto;
    }
    .win-ct::-webkit-scrollbar { width: 14px; }
    .win-ct::-webkit-scrollbar-track { background: var(--g2); }
    .win-ct::-webkit-scrollbar-thumb {
      background: var(--g2);
      box-shadow: var(--shadow-raised);
    }

    /* ── TABS ── */
    .tabs-strip {
      display: flex; gap: 4px;
      padding: 8px 8px 0; background: var(--bg);
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }
    .tab-btn {
      padding: 5px 14px; font-size: 12px; cursor: pointer;
      background: var(--g2); border: none;
      border-radius: 6px 6px 0 0; color: #555;
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.12), inset 1px 1px 0 rgba(255,255,255,0.8);
    }
    .tab-btn.active {
      background: #f0f0f0; font-weight: 700;
      color: var(--pink); z-index: 1;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.9);
    }

    /* ── ENTRY CONTENT ── */
    .entry-area { padding: 20px 24px; }
    .entry-date { font-size: 11px; color: var(--g3); margin-bottom: 3px; }
    .entry-heading {
      font-size: 20px; font-weight: 700; color: #1a1a1a;
      line-height: 1.25; margin-bottom: 7px;
    }
    .entry-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 10px;
      background: var(--accent); color: var(--bg);
      margin-bottom: 12px; letter-spacing: 0.04em;
      border-radius: 5px;
      box-shadow: inset -2px -2px 0 rgba(0,0,0,0.25), inset 1px 1px 0 rgba(255,255,255,0.3);
    }
    .divider { height: 1px; background: rgba(0,0,0,0.1); margin: 12px 0 14px; }
    .entry-body { font-size: 13px; line-height: 1.75; color: #2a2a2a; }
    .entry-body em { font-style: italic; color: var(--accent); opacity: 0.8; }
    .entry-body strong { font-weight: 700; }

    /* Buddy box */
    .buddy-box {
      background: #fff4ff; border: 1px solid rgba(221,106,223,0.25);
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.06);
      padding: 12px 14px; margin-top: 0; border-radius: 6px;
    }
    .buddy-label {
      font-size: 10px; font-weight: 700;
      color: var(--accent); opacity: 0.85; text-transform: uppercase;
      letter-spacing: 0.09em; margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px;
    }
    .buddy-label::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px;
      background: var(--pink); border-radius: 2px;
    }
    .buddy-body { font-size: 13px; line-height: 1.7; color: #3a1a3a; }
    .buddy-body em { font-style: italic; color: var(--accent); opacity: 0.75; }

    /* Status bar */
    .win-status {
      height: 26px; background: var(--bg);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex; align-items: center; flex-shrink: 0;
    }
    .status-pane {
      padding: 0 10px; font-size: 11px; height: 100%;
      display: flex; align-items: center;
      color: rgba(0,0,0,0.55);
      border-right: 1px solid rgba(0,0,0,0.1);
    }

    /* Resize handle */
    .win-resize {
      position: absolute; right: 0; bottom: 0;
      width: 18px; height: 18px; cursor: se-resize;
      background: linear-gradient(135deg,
        transparent 33%, rgba(0,0,0,0.25) 33%, rgba(0,0,0,0.25) 40%,
        transparent 40%, transparent 60%,
        rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.25) 67%, transparent 67%);
    }

    /* ── HUE SLIDER — Figma Win98 style ── */
    /* Wrapper needed so we can layer the track + rainbow independently */
    .slider-wrap {
      position: relative;
      width: 130px; height: 21px;
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    /* Rainbow gradient track sits as a pseudo layer */
    .slider-wrap::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      height: 3px;
      /* Figma track: black bg, inset highlight shadows, white drop below */
      background: #000;
      box-shadow:
        inset 1px 1px 0 #b8b8b8,
        inset -1px -1px 0 #757575,
        inset 0 1px 0 #9f9f9f,
        0 1px 0 #fff;
      pointer-events: none;
      z-index: 0;
    }
    /* Rainbow overlay on the track */
    .slider-wrap::after {
      content: '';
      position: absolute;
      left: 6px; right: 6px;   /* inset by half-thumb-width so colour stays inside */
      top: 50%; transform: translateY(-50%);
      height: 3px;
      background: linear-gradient(to right,
        hsl(0,75%,58%), hsl(30,75%,58%), hsl(60,75%,58%),
        hsl(90,75%,58%), hsl(120,75%,58%), hsl(150,75%,58%),
        hsl(180,75%,58%), hsl(210,75%,58%), hsl(240,75%,58%),
        hsl(270,75%,58%), hsl(300,75%,58%), hsl(330,75%,58%),
        hsl(360,75%,58%));
      pointer-events: none;
      z-index: 1;
    }
    #hue-slider {
      -webkit-appearance: none; appearance: none;
      position: relative; z-index: 2;
      width: 100%; height: 21px;
      background: transparent;
      border: none; outline: none;
      cursor: pointer;
      margin: 0;
    }
    /* Win98 thumb: 11px wide × 21px tall, raised grey rectangle */
    #hue-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 21px;
      background: var(--bg);
      /* Figma thumb shadows: classic raised bevels */
      box-shadow:
        inset -1px -1px 0 #0a0a0a,
        inset  1px  1px 0 #ffffff,
        inset -2px -2px 0 #808080,
        inset  2px  2px 0 #dfdfdf;
      border-radius: 0;
      cursor: pointer;
    }
    #hue-slider::-moz-range-thumb {
      width: 11px; height: 21px;
      background: var(--bg);
      box-shadow:
        inset -1px -1px 0 #0a0a0a,
        inset  1px  1px 0 #ffffff,
        inset -2px -2px 0 #808080,
        inset  2px  2px 0 #dfdfdf;
      border-radius: 0; border: none;
      cursor: pointer;
    }
    #hue-slider::-webkit-slider-runnable-track { background: transparent; }
    #hue-slider::-moz-range-track { background: transparent; }

    /* ── PALETTE SWATCHES ── */
    .palette-strip {
      height: 44px;
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px;
      background: var(--bg);
      box-shadow: var(--shadow-sunken);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .pal-label {
      font-size: 11px; font-weight: 700;
      color: var(--accent); white-space: nowrap;
    }
    /* Two-tone swatch: left=bg, right=accent */
    .pal-swatch {
      width: 28px; height: 20px;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: inset -1px -1px 0 rgba(0,0,0,0.35), inset 1px 1px 0 rgba(255,255,255,0.5);
      transition: transform 0.1s;
      flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .pal-swatch::after {
      content: '';
      position: absolute; right: 0; top: 0;
      width: 50%; height: 100%;
    }
    .pal-swatch:hover { transform: scale(1.12); }
    .pal-swatch.active {
      outline: 2px solid rgba(255,255,255,0.9);
      outline-offset: 1px;
    }

    /* ── CALENDAR ── */
    .cal-shell { background: #f0f0f0; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .cal-nav-btn {
      width: 28px; height: 24px;
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: 700; color: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btn:active { box-shadow: var(--shadow-sunken); transform: translate(1px,1px); }
    .cal-month-title { font-size: 13px; font-weight: 700; color: var(--accent); }
    .cal-dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--bg); border-bottom: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .cal-dow { font-size: 10px; font-weight: 700; color: var(--g3); text-align: center; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px; gap: 2px; }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer; position: relative;
      border-radius: 4px;
    }
    .cal-day:hover { background: rgba(221,106,223,0.15); }
    .cal-day.empty { pointer-events: none; }
    .cal-day.marked {
      background: var(--accent); color: var(--bg); font-weight: 700;
      box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 1px 1px 0 rgba(255,255,255,0.3);
    }
    .cal-day.marked:hover { filter: brightness(1.1); }
    .cal-day.selected-day { outline: 2px solid var(--accent); outline-offset: -2px; }
    .cal-day.today { outline: 2px solid var(--accent); outline-offset: -2px; font-weight: 700; }
    .cal-day .cal-tip {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: #fff; font-size: 10px;
      padding: 4px 8px; z-index: 9999;
      pointer-events: none; max-width: 180px;
      white-space: normal; text-align: center;
      border-radius: 4px;
    }
    .cal-day:hover .cal-tip { display: block; }
    .cal-notebar {
      height: 36px; background: var(--bg);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex; align-items: center; gap: 6px; padding: 0 10px;
      flex-shrink: 0;
    }
    .cal-selected-info { font-size: 11px; color: #555; white-space: nowrap; flex-shrink: 0; }
    .cal-notebar input {
      flex: 1; height: 22px; font-size: 11px;
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.2), inset -1px -1px 0 rgba(255,255,255,0.6);
      border: none; background: #fff; border-radius: 3px;
      padding: 0 6px; outline: none; font-family: inherit;
    }
    .cal-notebar button {
      height: 24px; padding: 0 10px; font-size: 11px;
      background: var(--bg); box-shadow: var(--shadow-raised);
      border: none; cursor: pointer; font-family: inherit; border-radius: 4px; color: var(--accent);
    }
    .cal-notebar button:active { box-shadow: var(--shadow-sunken); }

    /* ── CONTEXT MENU ── */
    #ctx-menu {
      position: fixed; background: var(--g2);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.4), inset -1px -1px 0 rgba(0,0,0,0.15);
      z-index: 99999; min-width: 160px;
      display: none; padding: 4px;
      border-radius: 8px;
    }
    .ctx-i { padding: 6px 16px; font-size: 13px; cursor: pointer; color: #000; border-radius: 5px; }
    .ctx-i:hover { background: var(--accent); color: var(--bg); }
    .ctx-sep { height: 1px; background: rgba(0,0,0,0.12); margin: 3px 6px; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════
// DATA

const SEC = {

    label: 'Professional', icon: '💼',

      {
        id: 'figma', tab: 'Figma & Claude Code',
        date: 'Spring 2025', tag: 'UI/UX',
        heading: 'Mastering Figma Auto-layout & Claude Code',
        samu: `It started with frustration. Auto-layout broke every time I tried to build a responsive card — I kept manually tweaking pixel values like it was 2012. Then something clicked: <em>constraints are not restrictions, they are instructions.</em> Once I stopped fighting the system and started describing intent, the designs started building themselves.\n\nClaude Code arrived at the perfect moment. I could prototype in real code with natural language, watch it render, iterate. The gap between what I could imagine and what I could build collapsed from weeks to hours. This wasn't just skill acquisition — it was an identity shift.`,
        khushi: `Khushi's parallel journey is fascinating — she moved from the Loon internship context into actively learning Framer. Where I found flow in code, she found it in no-code. Her rejection earlier in the semester, which could have been a setback, became what I'd call a <em>Risk Assessment Lesson</em> — a forced recalibration that sent her toward a tool that actually fits her creative voice better.`,
      },

        khushi: `For Khushi, the Loon rejection functioned as a similar catalyst. The internship anxiety she experienced resolved not through avoidance but through redirection. Framer became her "independent building" — proof that she could create without institutional validation.`,

  physical: {

        heading: 'From Intermittent Fasting to Badminton & Early Rising',
        samu: `I rated my physical state a 2 out of 5 at the start of the semester. Intermittent fasting had become a control mechanism more than a health practice — rigid, joyless, and exhausting to maintain socially. I dropped it.\n\nBadminton was an accident. A classmate dragged me to a session. But the court has a quality screens don't — <em>immediate, embodied feedback.</em> You miss the shuttle, you know instantly, you adjust. I added early rising to stack the habit: 6:30am, no phone for the first 30 minutes. The 2/5 is now a 5/5.`,
        khushi: `Khushi is the Buddy Inspiration here and I mean that genuinely. She went from baseline to <em>10/10 physical</em> — gymming every single day. That's not momentum, that's a lifestyle installation.\n\nWatching her consistency changed my relationship with excuses. If she can build that discipline while managing everything else in her life, the barriers I was citing were largely invented.`,
      },
    ],
  },
  social: {
    label: 'Social', icon: '👥',
    entries: [
      {
        id: 'orbit', tab: 'Orbit of 3',
        date: 'Spring 2025', tag: 'Philosophy',
        heading: 'The "Orbit of 3" Philosophy',
        samu: `I arrived at this through subtraction, not addition. I noticed my social energy was being spread across too many peripheral connections — people I'd meet, enjoy for an evening, then feel vaguely obligated to. The "Orbit of 3" isn't a rule, it's an observation: I function best with three close relationships that operate on genuine reciprocity.\n\nThe hard part was naming the dynamic honestly. <em>Some people orbit you when they need something and disappear when they don't.</em> Recognising this isn't cynicism — it's pattern recognition. The friendships that survived closer inspection are richer for it.`,
        khushi: `Khushi's social sphere is genuinely complex right now — balancing Arushi, her wider friend group, and increasing family gathering obligations. The tension: between depth and duty. Each system pulls with a different gravity.\n\nWhat I want her to hear: <em>you are allowed to be selective, even with people you love.</em>`,
      },
      {
        id: 'trips', tab: 'People Who Use You',
        date: 'Spring 2025', tag: 'Networking',
        heading: 'Realising People Use You vs. Making New Friends on Trips',
        samu: `There's a particular clarity that travel brings to social dynamics. Away from routine, the transactional relationships become obvious — they contribute nothing to shared experience, only extract.\n\nI made exactly two new friendships this semester that I'd call real. Both happened in unplanned moments, both grew without any agenda. The lesson: <em>stop trying to be likeable and start being present.</em> Likeable is a performance; present is magnetic.`,

    label: 'Emotional', icon: '🧠',
    entries: [

        samu: `Writing this took time. The breakup arrived not as a single moment but as a slow accumulation of knowing-before-knowing. When it finally happened, the pain was real but not surprising — which was itself disorienting. <em>How do you grieve something you already knew was ending?</em>\n\nThe answer turned out to be: the same way you grieve anything. You let it arrive. You don't schedule it or perform it. You sit with what's actually there.`,
        khushi: `April was hard for Khushi. Creative block and depression arrived together — which I think is not coincidental. For her, creativity and emotional state are deeply coupled. When one goes, the other follows.\n\n<em>The block is not a diagnosis, it's a season.</em> The work you did before April exists. The capability is not gone. Depression lies about permanence — that's its signature move. You are not behind. You are not broken. You are in a hard month, and hard months end.\n\nI see you. Keep going.`,

      {
        id: 'mind', tab: 'Mind Creates Emotions',

        heading: 'The "Mind Creates Emotions" Realisation',
        samu: `I had been treating emotions as things that happened <em>to</em> me — external events producing internal states. The realisation was more uncomfortable: <strong>the mind constructs the emotion from raw data.</strong> Two people experience the same event; they feel differently because they're running different interpretive software.\n\nThis doesn't make feelings less real. It makes them more interesting. If construction is happening, I can study the architecture. I can notice the moment interpretation begins and introduce a pause. This is not suppression — it's the opposite.`,

  about: {

        samu: `Welcome to <strong>Journal OS</strong> — my personal experimentation log for the semester. This is a design artifact and a journal simultaneously.\n\nFive folders, each mapping to a dimension of the semester: Professional, Physical, Social, Emotional, and Class Notes. Each window holds my own entries (Saumya) and, where relevant, observations about my buddy <strong>Khushi</strong> — accessible via the tab toggle.\n\n<em>Double-click any folder to open it. Windows are draggable and resizable. Right-click the desktop for options.</em>\n\nBuilt with vanilla HTML/CSS/JS. Design reference from Figma. Hosted on GitHub Pages.`,

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const wins = {};
let zTop = 100;

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 10000);

// ═══════════════════════════════════════════
// OPEN WINDOW
// ═══════════════════════════════════════════
function openWin(id) {
  if (wins[id]) {
    wins[id].el.classList.remove('minimized');
    focusWin(id); return;
  }
  const sec = SEC[id];
  const off = Object.keys(wins).length;
  const win = document.createElement('div');
  win.className = 'os-window win-open-anim';
  win.style.cssText = `width:700px;height:520px;left:${55+off*28}px;top:${28+off*22}px;z-index:${++zTop}`;

  const firstId = sec.entries[0].id;
  const sidebarHTML = sec.entries.map(e => `
    <div class="sb-item ${e.id===firstId?'active':''}"
         data-entry="${e.id}"
         onclick="loadEntry('${id}','${e.id}')">
      <span class="fi">${sec.icon}</span>${e.tab}
    </div>`).join('');

  win.innerHTML = `
    <div class="win-tb">
      <div class="win-tb-inner" id="tb-inner-${id}">
        <span class="win-tb-title">${sec.icon} ${sec.label}</span>
        <div class="win-ctrls">
          <button class="wc-btn" onclick="minWin('${id}')">─</button>
          <button class="wc-btn" onclick="maxWin('${id}')">▢</button>
          <button class="wc-btn" onclick="closeWin('${id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="win-bar">
      <button class="bar-btn" onclick="closeWin('${id}')">← Back</button>
    </div>
    <div class="win-body">
      <div class="win-sb" id="sb-${id}">
        <div class="sb-section">Entries</div>
        ${sidebarHTML}
      </div>
      <div class="win-ct" id="ct-${id}"></div>
    </div>
    <div class="win-status">
      <div class="status-pane">${sec.entries.length} item${sec.entries.length>1?'s':''}</div>
      <div class="status-pane">Journal OS</div>
    </div>
    <div class="win-resize"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  wins[id] = { el: win };
  win.addEventListener('mousedown', () => focusWin(id));
  makeDrag(win, win.querySelector('.win-tb'));
  makeResize(win, win.querySelector('.win-resize'));
  setTimeout(() => win.classList.remove('win-open-anim'), 200);

  loadEntry(id, firstId);

  // Apply current palette colours to the new window's elements
  win.querySelectorAll('.win-tb,.win-tb-inner,.win-sb,.win-bar,.win-status,.status-pane,.bar-btn').forEach(el=>el.style.background=currentBg);
  win.querySelectorAll('.win-ct').forEach(el=>el.style.background=shiftL(currentBg,6));
  win.querySelectorAll('.win-tb-title').forEach(el=>el.style.color=currentAccent);
  win.querySelectorAll('.wc-btn').forEach(el=>el.style.background=currentAccent);

  updateTB();
}

// ═══════════════════════════════════════════
// LOAD ENTRY
// ═══════════════════════════════════════════
function loadEntry(secId, entryId) {
  const sec = SEC[secId];
  const e   = sec.entries.find(x => x.id === entryId);
  if (!e) return;

  const sb = document.getElementById('sb-' + secId);
  if (sb) sb.querySelectorAll('.sb-item').forEach(el =>
    el.classList.toggle('active', el.dataset.entry === entryId));

  const ct = document.getElementById('ct-' + secId);
  if (!ct) return;

  const hasBuddy = !!e.khushi;
  const samuBody = fmt(e.samu || '');
  const tabs = hasBuddy ? `
    <div class="tabs-strip">
      <button class="tab-btn active" id="t-s-${secId}-${entryId}"
        onclick="switchTab('${secId}','${entryId}','samu')">My Journal</button>
      <button class="tab-btn" id="t-k-${secId}-${entryId}"
        onclick="switchTab('${secId}','${entryId}','khushi')">💜 Khushi</button>
    </div>` : '';

  ct.innerHTML = `
    ${tabs}
    <div class="entry-area">
      <div class="entry-date">${e.date}</div>
      <div class="entry-heading">${e.heading}</div>
      <span class="entry-tag">${e.tag}</span>
      <div class="divider"></div>
      <div id="pane-s-${secId}-${entryId}" class="entry-body">${samuBody}</div>
      ${hasBuddy ? `
        <div id="pane-k-${secId}-${entryId}" class="buddy-box" style="display:none;">
          <div class="buddy-label">Khushi — Buddy Entry</div>
          <div class="buddy-body">${fmt(e.khushi)}</div>
        </div>` : ''}
    </div>`;
}

function fmt(str) { return (str||'').replace(/\n/g,'<br><br>'); }

function switchTab(secId, entryId, which) {
  const ts = document.getElementById(`t-s-${secId}-${entryId}`);
  const tk = document.getElementById(`t-k-${secId}-${entryId}`);
  const ps = document.getElementById(`pane-s-${secId}-${entryId}`);
  const pk = document.getElementById(`pane-k-${secId}-${entryId}`);
  if (which === 'samu') {
    ts?.classList.add('active');    tk?.classList.remove('active');
    ps && (ps.style.display='');    pk && (pk.style.display='none');
  } else {
    tk?.classList.add('active');    ts?.classList.remove('active');
    pk && (pk.style.display='');    ps && (ps.style.display='none');
  }
}

// ═══════════════════════════════════════════
// WINDOW CONTROLS
// ═══════════════════════════════════════════
function closeWin(id) {
  if (!wins[id]) return;
  const el = wins[id].el;
  el.style.transition = 'opacity .12s, transform .12s';
  el.style.opacity='0'; el.style.transform='scale(0.9)';
  setTimeout(()=>{ el.remove(); delete wins[id]; updateTB(); }, 130);
}
function minWin(id) { wins[id]?.el.classList.toggle('minimized'); updateTB(); }
function maxWin(id) {
  const w = wins[id]?.el; if (!w) return;
  if (w.dataset.mx) {
    w.style.left=w.dataset.ox; w.style.top=w.dataset.oy;
    w.style.width=w.dataset.ow; w.style.height=w.dataset.oh;
    delete w.dataset.mx;
  } else {
    w.dataset.ox=w.style.left; w.dataset.oy=w.style.top;
    w.dataset.ow=w.style.width; w.dataset.oh=w.style.height;
    w.style.left='0'; w.style.top='0'; w.style.width='100%'; w.style.height='100%';
    w.dataset.mx='1';
  }
}
function focusWin(id) {
  Object.entries(wins).forEach(([k,v]) => {
    const inner = v.el.querySelector('.win-tb-inner');
    if (inner) inner.classList.toggle('inactive', k !== id);
  });
  if (wins[id]) wins[id].el.style.zIndex = ++zTop;
  updateTB();
}
function openAllWins()  { Object.keys(SEC).forEach((k,i)=>setTimeout(()=>openWin(k),i*80)); }
function closeAllWins() { Object.keys(wins).forEach(closeWin); }
function tileWins() {
  const ks = Object.keys(wins); if (!ks.length) return;
  const cols = Math.ceil(Math.sqrt(ks.length));
  const dw = document.getElementById('desktop').clientWidth;
  const dh = document.getElementById('desktop').clientHeight;
  ks.forEach((k,i) => {
    const w = wins[k].el;
    w.classList.remove('minimized');
    w.style.left = ((i%cols)*Math.floor(dw/cols))+'px';
    w.style.top  = (Math.floor(i/cols)*Math.floor(dh/Math.ceil(ks.length/cols)))+'px';
    w.style.width  = Math.floor(dw/cols)+'px';
    w.style.height = Math.floor(dh/Math.ceil(ks.length/cols))+'px';
    delete w.dataset.mx;
  });
}

// ═══════════════════════════════════════════
// TASKBAR
// ═══════════════════════════════════════════
function updateTB() {
  const bar = document.getElementById('tbApps');
  bar.innerHTML = '';
  Object.entries(wins).forEach(([id,rec]) => {
    const sec = SEC[id];
    const icon  = sec ? sec.icon  : '📅';
    const label = sec ? sec.label : 'My Dates';
    const focused = +rec.el.style.zIndex === zTop;
    const btn = document.createElement('div');
    btn.className = 'tb-btn' + (focused ? ' active' : '');
    btn.innerHTML = `<span class="fi">${icon}</span>${label}`;
    btn.onclick = () => {
      if (rec.el.classList.contains('minimized')) { rec.el.classList.remove('minimized'); focusWin(id); }
      else if (focused) minWin(id);
      else focusWin(id);
    };
    bar.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// DRAG + RESIZE
// ═══════════════════════════════════════════
function makeDrag(win, handle) {
  let sx, sy, sl, st;
  handle.addEventListener('mousedown', e => {
    if (e.target.closest('.win-ctrls') || win.dataset.mx) return;
    sx=e.clientX; sy=e.clientY;
    sl=parseInt(win.style.left)||0; st=parseInt(win.style.top)||0;
    const mv = e2 => {
      win.style.left = Math.max(0, sl+e2.clientX-sx)+'px';
      win.style.top  = Math.max(0, st+e2.clientY-sy)+'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', ()=>document.removeEventListener('mousemove',mv), {once:true});
  });
}
function makeResize(win, handle) {
  handle.addEventListener('mousedown', e => {
    e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, sw=win.offsetWidth, sh=win.offsetHeight;
    const mv = e2 => {
      win.style.width  = Math.max(340, sw+e2.clientX-sx)+'px';
      win.style.height = Math.max(220, sh+e2.clientY-sy)+'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', ()=>document.removeEventListener('mousemove',mv), {once:true});
  });
}

// ═══════════════════════════════════════════
// DRAGGABLE ICONS
// ═══════════════════════════════════════════
function selIcon(el) {
  document.querySelectorAll('.desk-icon').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
}
function clearSel(e) {
  if (!e.target.closest('.desk-icon'))
    document.querySelectorAll('.desk-icon').forEach(d=>d.classList.remove('selected'));
}
function makeIconDraggable(icon) {
  let dragging=false, moved=false, sx,sy,sl,st;
  icon.addEventListener('mousedown', e => {
    if (e.button!==0) return;
    moved=false; dragging=false;
    sx=e.clientX; sy=e.clientY;
    sl=parseInt(icon.style.left)||0; st=parseInt(icon.style.top)||0;
    selIcon(icon);
    const onMove = e2 => {
      const dx=e2.clientX-sx, dy=e2.clientY-sy;
      if (Math.hypot(dx,dy)<6) return;
      if (!dragging) { dragging=true; moved=true; icon.classList.add('dragging'); icon.style.zIndex=8000; }
      const desk=document.getElementById('desktop');
      icon.style.left = Math.max(0,Math.min(desk.clientWidth-icon.offsetWidth,  sl+dx))+'px';
      icon.style.top  = Math.max(0,Math.min(desk.clientHeight-icon.offsetHeight, st+dy))+'px';
    };
    const onUp = () => {
      if (dragging) { icon.classList.remove('dragging'); icon.style.zIndex=''; dragging=false; }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  icon.addEventListener('dblclick', e => { if (moved) { moved=false; e.stopPropagation(); e.preventDefault(); } });
}
document.querySelectorAll('.desk-icon').forEach(makeIconDraggable);

// CONTEXT MENU
// ═══════════════════════════════════════════
function showCtx(e) {
  e.preventDefault();
  const m=document.getElementById('ctx-menu');
  m.style.display='block'; m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px';
}
function hideCtx() { document.getElementById('ctx-menu').style.display='none'; }
document.addEventListener('click', hideCtx);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') hideCtx(); });

// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// COLOUR / PALETTE SYSTEM
// BG     → all surfaces (taskbar, windows, sidebars)
// ACCENT → all text, button backgrounds, icons
// ═══════════════════════════════════════════

let currentBg = '#c7d8c6';
let currentAccent = '#f34e3c';

function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h=0,s=0,l=(max+min)/2;
  if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}}
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s,hp=((h%360)+360)%360/60,x=c*(1-Math.abs(hp%2-1));
  let r=0,g=0,b=0;if(hp<1)[r,g,b]=[c,x,0];else if(hp<2)[r,g,b]=[x,c,0];else if(hp<3)[r,g,b]=[0,c,x];else if(hp<4)[r,g,b]=[0,x,c];else if(hp<5)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
  const m=l-c/2,h2=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return`#${h2(r)}${h2(g)}${h2(b)}`;
}
function hexAlpha(hex,a){return`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;}
function lightenBg(bg){const[h,s,l]=hexToHsl(bg);return hslToHex(h,Math.max(0,s-5),Math.min(96,l+8));}

function applyPalette(bgHex, accentHex) {
  currentBg = bgHex;
  currentAccent = accentHex;
  const cBg = lightenBg(bgHex);

  // 1. CSS variables for future elements
  const R = document.documentElement.style;
  R.setProperty('--bg',         bgHex);
  R.setProperty('--g2',         bgHex);
  R.setProperty('--accent',     accentHex);
  R.setProperty('--pink',       accentHex);
  R.setProperty('--content-bg', cBg);

  // 2. BG surfaces — set directly so inline styles are correct
  ['#taskbar','.os-window','.win-tb','.win-tb-inner','.win-sb','.win-bar',
   '.win-status','.status-pane','.start-btn','.tb-btn','.tb-clock',
   '.palette-strip','.bar-btn','.cal-nav','.cal-nav-btn','.cal-dow-row',
   '.cal-notebar','.cal-notebar button','.tabs-strip','.tab-btn','.sb-section',
  ].forEach(sel=>document.querySelectorAll(sel).forEach(el=>el.style.background=bgHex));

  // Content pane: lighter
  document.querySelectorAll('.win-ct').forEach(el=>el.style.background=cBg);

  // 3. ACCENT text
  ['.win-tb-title','.start-btn','.tb-btn','.tb-clock','.pal-label','.cal-month-title','.bar-btn']
    .forEach(sel=>document.querySelectorAll(sel).forEach(el=>el.style.color=accentHex));

  // 4. ACCENT bg, BG text (always readable regardless of combo)
  ['.wc-btn','.entry-tag','.sb-item.active','.cal-day.marked','.cal-notebar button']
    .forEach(sel=>document.querySelectorAll(sel).forEach(el=>{
      el.style.background=accentHex; el.style.color=bgHex;
    }));

  // Active tab
  document.querySelectorAll('.tab-btn.active').forEach(el=>{
    el.style.background=cBg; el.style.color=accentHex;
  });

  // 5. Dynamic :hover rules (pseudo-classes can't be set inline)
  document.getElementById('dynamic-theme').textContent=`
    .desk-icon:hover   {background:${hexAlpha(accentHex,.15)}!important}
    .desk-icon.selected{background:${hexAlpha(accentHex,.28)}!important}
    .sb-item:hover     {background:${accentHex}!important;color:${bgHex}!important}
    .sb-item.active    {background:${accentHex}!important;color:${bgHex}!important}
    .ctx-i:hover       {background:${accentHex}!important;color:${bgHex}!important}
    .cal-day:hover     {background:${hexAlpha(accentHex,.18)}!important}
    .cal-day.marked    {background:${accentHex}!important;color:${bgHex}!important}
    .tab-btn.active    {background:${cBg}!important;color:${accentHex}!important}
    .wc-btn            {background:${accentHex}!important;color:${bgHex}!important}
    .entry-tag         {background:${accentHex}!important;color:${bgHex}!important}
    .cal-nav-btn       {background:${bgHex}!important;color:${accentHex}!important}
  `;

  // Sync slider to accent hue
  const[h]=hexToHsl(accentHex);
  hueSlider.value=Math.round(h);
}

const hueSlider = document.getElementById('hue-slider');

hueSlider.addEventListener('input', e=>{
  const[,s,l]=hexToHsl(currentAccent);
  applyPalette(currentBg, hslToHex(Number(e.target.value), Math.max(50,s), Math.max(28,Math.min(62,l))));
  document.querySelectorAll('.pal-swatch').forEach(s=>s.classList.remove('active'));
});

document.querySelectorAll('.pal-swatch').forEach(sw=>{
  sw.addEventListener('click',()=>{
    applyPalette(sw.dataset.bg, sw.dataset.accent);
    document.querySelectorAll('.pal-swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
  });
});


// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
const markedDates = {};
const PRESET = {
  '2026-01-05': 'Assignment begins',
  '2026-01-12': 'First journal entry',
  '2026-01-20': 'Figma auto-layout breakthrough',
  '2026-02-03': 'Badminton habit started',
  '2026-02-14': 'Orbit of 3 realisation',
  '2026-02-28': 'Waves on the Shore meditation',
  '2026-03-10': 'Physical rating hits 5/5',
  '2026-03-22': 'Social: new friends on trip',
  '2026-04-01': 'Khushi difficult month begins',
  '2026-04-15': 'Mind Creates Emotions insight',
  '2026-04-25': 'Assignment wraps up!',
};
Object.assign(markedDates, PRESET);

let calSelectedKey = null;
let calCurrentMonth = 0; // 0=Jan, 1=Feb, 2=Mar, 3=Apr (2026)
const CAL_MONTHS = [
  { year:2026, month:0, label:'January 2026' },
  { year:2026, month:1, label:'February 2026' },
  { year:2026, month:2, label:'March 2026' },
  { year:2026, month:3, label:'April 2026' },
];

function openCalendar() {
  const id='__calendar__';
  if (wins[id]) { wins[id].el.classList.remove('minimized'); focusWin(id); return; }
  const off=Object.keys(wins).length;
  const win=document.createElement('div');
  win.className='os-window win-open-anim';
  win.style.cssText=`width:420px;height:420px;left:${80+off*28}px;top:${40+off*22}px;z-index:${++zTop}`;

  win.innerHTML=`
    <div class="win-tb">
      <div class="win-tb-inner" id="tb-inner-${id}">
        <span class="win-tb-title">📅 My Dates</span>
        <div class="win-ctrls">
          <button class="wc-btn" onclick="minWin('${id}')">─</button>
          <button class="wc-btn" onclick="maxWin('${id}')">▢</button>
          <button class="wc-btn" onclick="closeWin('${id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="cal-shell">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">◀</button>
        <span class="cal-month-title" id="cal-month-title"></span>
        <button class="cal-nav-btn" onclick="calNav(1)">▶</button>
      </div>
      <div class="cal-dow-row">
        ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-notebar">
        <span class="cal-selected-info" id="cal-sel-info">Click a date</span>
        <input type="text" id="cal-note-input" placeholder="Add note…" disabled />
        <button onclick="saveCalNote('${id}')">Mark</button>
        <button onclick="clearCalNote('${id}')">Clear</button>
      </div>
    </div>
    <div class="win-status">
      <div class="status-pane" id="cal-status-pane">${Object.keys(markedDates).length} marked</div>
      <div class="status-pane">Jan – Apr 2026</div>
    </div>
    <div class="win-resize"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  wins[id]={ el:win };
  win.addEventListener('mousedown', ()=>focusWin(id));
  makeDrag(win, win.querySelector('.win-tb'));
  makeResize(win, win.querySelector('.win-resize'));
  setTimeout(()=>win.classList.remove('win-open-anim'),200);

  renderCalGrid();
  updateTB();
}

function calNav(dir) {
  calCurrentMonth = Math.max(0, Math.min(3, calCurrentMonth + dir));
  renderCalGrid();
}

function renderCalGrid() {
  const { year, month, label } = CAL_MONTHS[calCurrentMonth];
  const titleEl = document.getElementById('cal-month-title');
  if (titleEl) { titleEl.textContent = label; titleEl.style.color = getComputedStyle(document.documentElement).getPropertyValue('--pink').trim(); }

  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML='';

  const today=new Date();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);
  }
  for(let d=1;d<=daysInMonth;d++){
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell=document.createElement('div');
    cell.className='cal-day';
    cell.textContent=d;
    cell.dataset.key=key;
    if(today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d) cell.classList.add('today');
    if(markedDates[key]){
      cell.classList.add('marked');
      const tip=document.createElement('div'); tip.className='cal-tip'; tip.textContent=markedDates[key];
      cell.appendChild(tip);
    }
    if(key===calSelectedKey) cell.classList.add('selected-day');
    cell.addEventListener('click',()=>selectCalDay(key,cell));
    grid.appendChild(cell);
  }
}

function selectCalDay(key,cell) {
  document.querySelectorAll('.cal-day.selected-day').forEach(el=>el.classList.remove('selected-day'));
  calSelectedKey=key; cell.classList.add('selected-day');
  const info=document.getElementById('cal-sel-info');
  const input=document.getElementById('cal-note-input');
  if(info) info.textContent=key;
  if(input){ input.disabled=false; input.value=markedDates[key]||''; input.focus(); }
}
function saveCalNote(id) {
  if(!calSelectedKey) return;
  const input=document.getElementById('cal-note-input');
  const note=input?input.value.trim():'';
  if(note) markedDates[calSelectedKey]=note; else delete markedDates[calSelectedKey];
  renderCalGrid();
  const sp=document.getElementById('cal-status-pane');
  if(sp) sp.textContent=Object.keys(markedDates).length+' marked';
}
function clearCalNote(id) {
  if(!calSelectedKey) return;
  delete markedDates[calSelectedKey];
  const input=document.getElementById('cal-note-input');
  if(input) input.value='';
  renderCalGrid();
  const sp=document.getElementById('cal-status-pane');
  if(sp) sp.textContent=Object.keys(markedDates).length+' marked';
}
applyPalette(currentBg, currentAccent);
</script>
