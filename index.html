<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal OS — Saumya</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #dd6adf;
      --pink-dark:   #b84fbf;
      --pink-inactive: #b8a0ba;
      --cream:       #fff9f0;
      --g0:          #ffffff;
      --g1:          #dfdfdf;
      --g2:          #c0c0c0;
      --g3:          #808080;
      --g4:          #0a0a0a;
      --raised: inset -1px -1px 0 #0a0a0a,
                inset  1px  1px 0 #ffffff,
                inset -2px -2px 0 #808080,
                inset  2px  2px 0 #dfdfdf;
      --sunken: inset -1px -1px 0 #ffffff,
                inset  1px  1px 0 #0a0a0a,
                inset -2px -2px 0 #dfdfdf,
                inset  2px  2px 0 #808080;
      --inset:  inset 1px 1px 0 #808080,
                inset -1px -1px 0 #dfdfdf;
      --window: inset -1px -1px 0 #0a0a0a,
                inset  1px  1px 0 #dfdfdf,
                inset -2px -2px 0 #808080,
                inset  2px  2px 0 #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      overflow: hidden;
      height: 100vh; width: 100vw;
      cursor: default;
      user-select: none;
    }
    a, button, .desk-icon, .tb-btn, .start-btn, .theme-toggle, .bar-btn, .wc-btn, .sb-item, .ctx-i, .cal-day, .win-resize, #hue-slider {
      cursor: pointer !important;
    }

    /* ── DESKTOP ── */
    #desktop {
      position: fixed;
      inset: 0 0 50px 0;
      overflow: hidden;
      background-color: var(--cream);
      background-image:
        linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 29px 29px;
    }

    /* ── DESKTOP ICONS ── */
    .desk-icon {
      position: absolute;
      width: 80px;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      padding: 8px 4px; border-radius: 2px; cursor: pointer;
    }
    .desk-icon:hover    { background: rgba(221,106,223,0.15); }
    .desk-icon.selected { background: rgba(221,106,223,0.28); outline: 1px dotted #888; }
    .desk-icon.dragging { opacity: 0.75; cursor: grabbing; z-index: 8000 !important; }
    .desk-icon .fi {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; pointer-events: none;
    }
    .desk-icon span {
      font-size: 11px; color: #1a1a1a;
      text-align: center; line-height: 1.2;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.85);
      pointer-events: none;
    }

    /* ── TASKBAR ── */
    #taskbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 50px;
      background: var(--pink);
      box-shadow: var(--window);
      display: flex; align-items: center;
      padding: 3px; gap: 3px; z-index: 9999;
    }
    .start-btn {
      height: 44px; padding: 0 14px;
      background: var(--g2); box-shadow: var(--raised);
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; flex-shrink: 0;
      font-size: 15px; font-weight: 700; color: #000;
    }
    .start-btn:active { box-shadow: var(--sunken); }
    .taskbar-apps { display: flex; gap: 3px; flex: 1; min-width: 0; }
    .tb-btn {
      height: 44px; padding: 0 10px;
      background: var(--g2); box-shadow: var(--raised);
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 12px;
      white-space: nowrap; overflow: hidden;
      max-width: 180px; text-overflow: ellipsis;
      color: #000;
    }
    .tb-btn.active  { box-shadow: var(--sunken); }
    .tb-btn:active  { box-shadow: var(--sunken); }
    .tb-btn .fi     { font-size: 16px; flex-shrink: 0; }
    .tb-divider { width: 3px; height: 44px; background: linear-gradient(90deg, #808080 50%, #dfdfdf 50%); flex-shrink: 0; }
    .theme-toggle {
      height: 44px; padding: 0 10px;
      background: var(--g2); box-shadow: var(--raised);
      border: none; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; color: #000;
      flex-shrink: 0;
    }
    .theme-toggle:active { box-shadow: var(--sunken); }
    .tb-clock {
      height: 44px; padding: 0 12px;
      background: var(--g2);
      box-shadow: inset -1px -1px 0 #dfdfdf, inset 1px 1px 0 #808080;
      display: flex; align-items: center;
      font-size: 14px; flex-shrink: 0;
    }

    /* ── WINDOW SHELL ── */
    .os-window {
      position: absolute;
      min-width: 340px; min-height: 220px;
      background: var(--g2);
      box-shadow: var(--window);
      display: flex; flex-direction: column;
      transition: none;
    }
    .os-window.minimized { display: none !important; }
    @keyframes winOpen {
      from { opacity:0; transform:scale(0.88) translateY(8px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .win-open-anim { animation: winOpen 0.14s cubic-bezier(.34,1.4,.64,1) forwards; }

    /* Titlebar */
    .win-tb {
      height: 54px;
      background: var(--g2);
      box-shadow: var(--window);
      display: flex; align-items: center;
      padding: 3px; gap: 0;
      flex-shrink: 0; cursor: grab; position: relative;
    }
    .win-tb:active { cursor: grabbing; }
    .win-tb-inner {
      flex: 1; height: 48px;
      background: var(--pink);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      transition: background 0.1s;
    }
    .win-tb-inner.inactive { background: var(--pink-inactive); }
    .win-tb-title {
      font-size: 22px; font-weight: 700; color: #fff;
      pointer-events: none; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .win-ctrls { display: flex; gap: 1px; }
    .wc-btn {
      width: 29px; height: 26px;
      background: var(--g2); box-shadow: var(--raised);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #000;
    }
    .wc-btn:active { box-shadow: var(--sunken); }

    /* Toolbar */
    .win-bar {
      height: 28px; background: var(--g2);
      border-bottom: 1px solid var(--g3);
      display: flex; align-items: center;
      padding: 0 4px; gap: 2px; flex-shrink: 0;
    }
    .bar-btn {
      height: 22px; padding: 0 8px; font-size: 12px;
      background: var(--g2); box-shadow: var(--raised);
      border: none; cursor: pointer; color: #000;
    }
    .bar-btn:active { box-shadow: var(--sunken); }

    /* Body */
    .win-body { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .win-sb {
      width: 168px; background: var(--g2);
      border-right: 2px solid;
      border-color: #808080 #dfdfdf #dfdfdf #808080;
      display: flex; flex-direction: column;
      padding: 4px 0; flex-shrink: 0; overflow-y: auto;
    }
    .sb-section {
      font-size: 10px; font-weight: 700; color: var(--g3);
      padding: 8px 10px 3px;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .sb-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; font-size: 12px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #000;
    }
    .sb-item .fi { font-size: 14px; flex-shrink: 0; }
    .sb-item:hover  { background: var(--pink); color: #fff; }
    .sb-item.active { background: var(--pink); color: #fff; }

    /* Content */
    .win-ct {
      flex: 1; background: #f0f0f0;
      box-shadow: var(--inset);
      overflow-y: auto;
    }
    .win-ct::-webkit-scrollbar { width: 16px; }
    .win-ct::-webkit-scrollbar-track { background: var(--g2); }
    .win-ct::-webkit-scrollbar-thumb { background: var(--g2); box-shadow: var(--raised); }

    /* Tabs */
    .tabs-strip {
      display: flex; gap: 2px;
      padding: 6px 6px 0; background: var(--g2);
      border-bottom: 2px solid var(--g3);
    }
    .tab-btn {
      padding: 4px 14px; font-size: 12px; cursor: pointer;
      background: var(--g2); box-shadow: var(--raised);
      border: none; position: relative; bottom: -2px; color: #000;
    }
    .tab-btn.active {
      background: #f0f0f0; font-weight: 700; z-index: 1;
      box-shadow: inset -1px 0 0 #0a0a0a, inset 1px 0 0 #dfdfdf, inset 0 1px 0 #dfdfdf;
    }

    /* Entry layout */
    .entry-area { padding: 20px 24px; }
    .entry-date { font-size: 11px; color: var(--g3); margin-bottom: 3px; }
    .entry-heading {
      font-size: 20px; font-weight: 700; color: #1a1a1a;
      line-height: 1.25; margin-bottom: 7px;
    }
    .entry-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 9px; background: var(--pink); color: #fff;
      margin-bottom: 12px; letter-spacing: 0.04em;
    }
    .divider { height: 1px; background: #c8c8c8; margin: 12px 0 14px; }
    .entry-body {
      font-size: 13px; line-height: 1.75; color: #2a2a2a;
    }
    .entry-body em { font-style: italic; color: var(--pink-dark); }
    .entry-body strong { font-weight: 700; }

    /* Buddy box */
    .buddy-box {
      background: #fff4ff; border: 1px solid #e8b0ea;
      box-shadow: var(--inset);
      padding: 12px 14px; margin-top: 0;
    }
    .buddy-label {
      font-size: 10px; font-weight: 700;
      color: var(--pink-dark); text-transform: uppercase;
      letter-spacing: 0.09em; margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px;
    }
    .buddy-label::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; background: var(--pink);
    }
    .buddy-body { font-size: 13px; line-height: 1.7; color: #3a1a3a; }
    .buddy-body em { font-style: italic; color: var(--pink-dark); }

    /* Statusbar */
    .win-status {
      height: 26px; background: var(--g2);
      border-top: 1px solid var(--g3);
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .status-pane {
      padding: 0 10px; font-size: 11px; height: 100%;
      display: flex; align-items: center;
      border-right: 2px solid;
      border-color: #808080 #dfdfdf #dfdfdf #808080;
    }

    /* Resize handle */
    .win-resize {
      position: absolute; right: 0; bottom: 0;
      width: 16px; height: 16px; cursor: se-resize;
      background:
        linear-gradient(135deg,
          transparent 33%, #808080 33%, #808080 40%,
          transparent 40%, transparent 60%,
          #808080 60%, #808080 67%, transparent 67%);
    }

    /* ── COLOUR SLIDER WIDGET ── */
    #colour-widget {
      position: absolute;
      bottom: 16px; right: 16px;
      background: var(--g2);
      box-shadow: var(--window);
      padding: 0;
      width: 220px;
      min-width: 220px;
      max-width: 220px;
      z-index: 50;
    }
    #colour-widget .cw-tb {
      height: 28px;
      background: var(--pink);
      display: flex; align-items: center;
      padding: 0 8px;
      font-size: 12px; font-weight: 700; color: #fff;
      cursor: grab; transition: background 0.2s;
    }
    #colour-widget .cw-body {
      padding: 10px 12px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #colour-widget label {
      font-size: 11px; color: #1a1a1a;
      display: flex; justify-content: space-between; align-items: center;
    }
    #colour-widget .swatch {
      width: 16px; height: 16px;
      box-shadow: var(--inset);
      display: inline-block; flex-shrink: 0;
    }
    /* hue slider — rainbow track */
    #hue-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%; height: 14px;
      border: none; outline: none;
      box-shadow: var(--inset);
      background: linear-gradient(to right,
        hsl(0,80%,60%), hsl(30,80%,60%), hsl(60,80%,60%),
        hsl(90,80%,60%), hsl(120,80%,60%), hsl(150,80%,60%),
        hsl(180,80%,60%), hsl(210,80%,60%), hsl(240,80%,60%),
        hsl(270,80%,60%), hsl(300,80%,60%), hsl(330,80%,60%), hsl(360,80%,60%));
      cursor: pointer;
    }
    #hue-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 20px;
      background: var(--g2);
      box-shadow: var(--raised);
      cursor: pointer;
    }
    #hue-slider::-moz-range-thumb {
      width: 14px; height: 20px;
      background: var(--g2);
      box-shadow: var(--raised);
      border: none; cursor: pointer;
    }


    /* ── CALENDAR WINDOW ── */
    .cal-shell { background: #f0f0f0; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .cal-months { display: flex; gap: 0; flex: 1; overflow: hidden; }
    .cal-month { flex: 1; border-right: 2px solid #c0c0c0; display: flex; flex-direction: column; min-width: 0; }
    .cal-month:last-child { border-right: none; }
    .cal-month-header {
      padding: 6px 10px;
      font-size: 12px; font-weight: 700;
      background: var(--g2); box-shadow: var(--raised);
      text-align: center; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .cal-dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--g2); border-bottom: 1px solid #aaa;
      flex-shrink: 0;
    }
    .cal-dow {
      font-size: 9px; font-weight: 700; color: #555;
      text-align: center; padding: 3px 0;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; align-content: start; }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; position: relative;
      border: 1px solid transparent; margin: 1px;
    }
    .cal-day:hover { background: rgba(221,106,223,0.15); }
    .cal-day.empty { pointer-events: none; }
    .cal-day.marked {
      background: var(--pink);
      color: #fff; font-weight: 700;
      border-radius: 2px;
    }
    .cal-day.marked:hover { background: var(--pink-dark); }
    .cal-day.selected-day { outline: 2px solid #333; outline-offset: -2px; }
    .cal-day.today { outline: 2px solid var(--pink-dark); outline-offset: -2px; font-weight:700; }
    /* Tooltip */
    .cal-day .cal-tip {
      display: none; position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: #fff; font-size: 10px;
      padding: 4px 8px; white-space: nowrap; z-index: 9999;
      pointer-events: none; max-width: 180px; white-space: normal; text-align: center;
    }
    .cal-day:hover .cal-tip { display: block; }
    /* Note input strip */
    .cal-notebar {
      height: 34px; background: var(--g2); border-top: 2px solid #808080;
      display: flex; align-items: center; gap: 6px; padding: 0 10px;
      flex-shrink: 0;
    }
    .cal-notebar label { font-size: 11px; color: #333; white-space: nowrap; }
    .cal-notebar input {
      flex: 1; height: 22px; font-size: 11px;
      box-shadow: var(--sunken); border: none; background: #fff;
      padding: 0 6px; outline: none; font-family: inherit;
    }
    .cal-notebar button {
      height: 22px; padding: 0 10px; font-size: 11px;
      background: var(--g2); box-shadow: var(--raised); border: none;
      cursor: pointer; font-family: inherit;
    }
    .cal-notebar button:active { box-shadow: var(--sunken); }
    .cal-selected-info { font-size: 11px; color: #555; white-space: nowrap; }

    /* Context menu */
    #ctx-menu {
      position: fixed; background: var(--g2);
      box-shadow: var(--window);
      z-index: 99999; min-width: 160px;
      display: none; padding: 2px;
    }
    .ctx-i { padding: 5px 18px; font-size: 13px; cursor: pointer; color: #000; }
    .ctx-i:hover { background: var(--pink); color: #fff; }
    .ctx-sep { height: 1px; background: var(--g3); margin: 3px 2px; }

    /* Welcome screen */
    .welcome-area { padding: 28px 30px; background: #f0f0f0; }
    .welcome-area h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .welcome-area p { font-size: 13px; line-height: 1.7; color: #2a2a2a; margin-bottom: 10px; }
    .hint-box {
      background: var(--g2); box-shadow: var(--inset);
      padding: 10px 14px; font-size: 12px; color: #1a1a1a;
      margin-top: 16px; line-height: 1.6;
    }

    /* ── DARK MODE ── */
    body.dark {
      color: #e5e7eb;
      /* Warm dark UI bevel/shadow system */
      --raised: inset -1px -1px 0 #0f0c0b,
                inset  1px  1px 0 #4a3f3a,
                inset -2px -2px 0 #181311,
                inset  2px  2px 0 #6a5b54;
      --sunken: inset -1px -1px 0 #6a5b54,
                inset  1px  1px 0 #0f0c0b,
                inset -2px -2px 0 #4a3f3a,
                inset  2px  2px 0 #181311;
      --inset:  inset 1px 1px 0 #181311,
                inset -1px -1px 0 #4a3f3a;
      --window: inset -1px -1px 0 #0f0c0b,
                inset  1px  1px 0 #4a3f3a,
                inset -2px -2px 0 #181311,
                inset  2px  2px 0 #6a5b54;
    }
    body.dark #desktop {
      background-color: #171312;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    }
    body.dark .desk-icon span { color: #e5e7eb; text-shadow: 1px 1px 0 rgba(0,0,0,0.7); }
    body.dark .os-window,
    body.dark .win-tb,
    body.dark .win-bar,
    body.dark .win-sb,
    body.dark .win-status,
    body.dark .status-pane,
    body.dark .tb-btn,
    body.dark .start-btn,
    body.dark .theme-toggle,
    body.dark .tb-clock,
    body.dark #colour-widget,
    body.dark #ctx-menu,
    body.dark .cal-notebar,
    body.dark .cal-month-header,
    body.dark .cal-dow-row {
      background: #26201e;
      color: #e5e7eb;
      border-color: #130f0e #3a312d #3a312d #130f0e;
      box-shadow: var(--window);
    }
    body.dark .win-ct,
    body.dark .welcome-area,
    body.dark .cal-shell {
      background: #1c1715;
      color: #e5e7eb;
    }
    body.dark .tb-btn,
    body.dark .start-btn,
    body.dark .theme-toggle,
    body.dark .bar-btn,
    body.dark .wc-btn,
    body.dark .cal-notebar button {
      box-shadow: var(--raised);
    }
    body.dark .tb-btn:active,
    body.dark .start-btn:active,
    body.dark .theme-toggle:active,
    body.dark .bar-btn:active,
    body.dark .wc-btn:active,
    body.dark .cal-notebar button:active,
    body.dark .tb-btn.active {
      box-shadow: var(--sunken);
    }
    body.dark .tb-clock {
      box-shadow: inset -1px -1px 0 #4a3f3a, inset 1px 1px 0 #181311;
    }
    body.dark .tb-divider {
      background: linear-gradient(90deg, #181311 50%, #4a3f3a 50%);
    }
    body.dark .entry-heading,
    body.dark .entry-body,
    body.dark .welcome-area h2,
    body.dark .welcome-area p,
    body.dark .hint-box,
    body.dark .sb-item,
    body.dark .bar-btn,
    body.dark .ctx-i,
    body.dark #colour-widget label,
    body.dark .cal-selected-info,
    body.dark .cal-notebar label,
    body.dark .cal-dow,
    body.dark .cal-day {
      color: #e5e7eb;
    }
    body.dark .hint-box,
    body.dark .buddy-box {
      background: #2b2421;
      border-color: #4a3d38;
    }
    body.dark .divider { background: #4a3d38; }
    body.dark .cal-notebar input {
      background: #171312;
      color: #e5e7eb;
    }
    body.dark .cal-day.empty { color: #8b7d77; }
    body.dark .ctx-i:hover,
    body.dark .sb-item:hover,
    body.dark .sb-item.active {
      color: #fff;
    }
  </style>
</head>
<body>

<!-- Desktop -->
<div id="desktop" oncontextmenu="showCtx(event)" onclick="clearSel(event)">
  <div class="desk-icon" id="icon-professional" style="left:16px;top:16px"
       ondblclick="openWin('professional')">
    <div class="fi">💼</div><span>Professional</span>
  </div>
  <div class="desk-icon" id="icon-physical" style="left:16px;top:110px"
       ondblclick="openWin('physical')">
    <div class="fi">🏸</div><span>Physical</span>
  </div>
  <div class="desk-icon" id="icon-social" style="left:16px;top:204px"
       ondblclick="openWin('social')">
    <div class="fi">👥</div><span>Social</span>
  </div>
  <div class="desk-icon" id="icon-emotional" style="left:16px;top:298px"
       ondblclick="openWin('emotional')">
    <div class="fi">🧠</div><span>Emotional</span>
  </div>
  <div class="desk-icon" id="icon-misc" style="left:104px;top:16px"
       ondblclick="openWin('misc')">
    <div class="fi">📓</div><span>Class Notes</span>
  </div>

}

function setTheme(dark) {
  isDarkMode = !!dark;
  document.body.classList.toggle('dark', isDarkMode);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = isDarkMode ? '☀️ Light' : '🌙 Dark';
  try {
    localStorage.setItem('journal-theme', isDarkMode ? 'dark' : 'light');
  } catch (_) {}
}

function toggleTheme() {
  setTheme(!isDarkMode);
}

function initTheme() {
  let saved = null;
  try {
    saved = localStorage.getItem('journal-theme');
  } catch (_) {}
  setTheme(saved === 'dark');
}
initTheme();

// OPEN WINDOW
// ═══════════════════════════════════════════
function openWin(id) {
  if (wins[id]) {
    wins[id].el.classList.remove('minimized');
    focusWin(id); return;
  }
  const sec = SEC[id];
  const off = Object.keys(wins).length;
  const win = document.createElement('div');
  win.className = 'os-window win-open-anim';
  win.style.cssText = `width:700px;height:520px;left:${55+off*28}px;top:${28+off*22}px;z-index:${++zTop}`;

  const firstId = sec.entries[0].id;
  const sidebarHTML = sec.entries.map(e => `
    <div class="sb-item ${e.id===firstId?'active':''}"
         data-entry="${e.id}"
         onclick="loadEntry('${id}','${e.id}')">
      <span class="fi">${sec.icon}</span>${e.tab}
    </div>`).join('');

  win.innerHTML = `
    <div class="win-tb">
      <div class="win-tb-inner" id="tb-inner-${id}">
        <span class="win-tb-title">${sec.icon} ${sec.label}</span>
        <div class="win-ctrls">
          <button class="wc-btn" onclick="minWin('${id}')">─</button>
          <button class="wc-btn" onclick="maxWin('${id}')">□</button>
          <button class="wc-btn" onclick="closeWin('${id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="win-bar">
      <button class="bar-btn" onclick="closeWin('${id}')">← Back</button>
      <button class="bar-btn">File</button>
      <button class="bar-btn">View</button>
    </div>
    <div class="win-body">
      <div class="win-sb" id="sb-${id}">
        <div class="sb-section">Entries</div>
        ${sidebarHTML}
      </div>
      <div class="win-ct" id="ct-${id}"></div>
    </div>
    <div class="win-status">
      <div class="status-pane">${sec.entries.length} item${sec.entries.length>1?'s':''}</div>
      <div class="status-pane">Journal OS</div>
    </div>
    <div class="win-resize"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  wins[id] = { el: win };
  win.addEventListener('mousedown', () => focusWin(id));
  makeDrag(win, win.querySelector('.win-tb'));
  makeResize(win, win.querySelector('.win-resize'));
  setTimeout(() => win.classList.remove('win-open-anim'), 200);

  loadEntry(id, firstId);
  updateTB();
}

// ═══════════════════════════════════════════
// LOAD ENTRY INTO CONTENT PANE
// ═══════════════════════════════════════════
function loadEntry(secId, entryId) {
  const sec = SEC[secId];
  const e   = sec.entries.find(x => x.id === entryId);
  if (!e) return;

  // Update sidebar highlight
  const sb = document.getElementById('sb-' + secId);
  if (sb) sb.querySelectorAll('.sb-item').forEach(el =>
    el.classList.toggle('active', el.dataset.entry === entryId));

  const ct = document.getElementById('ct-' + secId);
  if (!ct) return;

  const hasBuddy = !!e.khushi;
  const samuBody = fmt(e.samu || '');
  const khushiBody = hasBuddy ? fmt(e.khushi) : '';

  const tabs = hasBuddy ? `
    <div class="tabs-strip">
      <button class="tab-btn active" id="t-s-${secId}-${entryId}"
        onclick="switchTab('${secId}','${entryId}','samu')">My Journal</button>
      <button class="tab-btn" id="t-k-${secId}-${entryId}"
        onclick="switchTab('${secId}','${entryId}','khushi')">💜 Khushi</button>
    </div>` : '';

  ct.innerHTML = `
    ${tabs}
    <div class="entry-area">
      <div class="entry-date">${e.date}</div>
      <div class="entry-heading">${e.heading}</div>
      <span class="entry-tag">${e.tag}</span>
      <div class="divider"></div>
      <div id="pane-s-${secId}-${entryId}" class="entry-body">${samuBody}</div>
      ${hasBuddy ? `
        <div id="pane-k-${secId}-${entryId}" class="buddy-box" style="display:none;">
          <div class="buddy-label">Khushi — Buddy Entry</div>
          <div class="buddy-body">${khushiBody}</div>
        </div>` : ''}
    </div>`;
}

function fmt(str) {
  return (str || '').replace(/\n/g, '<br><br>');
}

function switchTab(secId, entryId, which) {
  const ts = document.getElementById(`t-s-${secId}-${entryId}`);
  const tk = document.getElementById(`t-k-${secId}-${entryId}`);
  const ps = document.getElementById(`pane-s-${secId}-${entryId}`);
  const pk = document.getElementById(`pane-k-${secId}-${entryId}`);
  if (which === 'samu') {
    ts && ts.classList.add('active');
    tk && tk.classList.remove('active');
    ps && (ps.style.display = '');
    pk && (pk.style.display = 'none');
  } else {
    tk && tk.classList.add('active');
    ts && ts.classList.remove('active');
    pk && (pk.style.display = '');
    ps && (ps.style.display = 'none');
  }
}

// ═══════════════════════════════════════════
// WINDOW CONTROLS
// ═══════════════════════════════════════════
function closeWin(id) {
  if (!wins[id]) return;
  const el = wins[id].el;
  el.style.transition = 'opacity .12s, transform .12s';
  el.style.opacity = '0'; el.style.transform = 'scale(0.9)';
  setTimeout(() => { el.remove(); delete wins[id]; updateTB(); }, 130);
}
function minWin(id) {
  wins[id]?.el.classList.toggle('minimized');
  updateTB();
}
function maxWin(id) {
  const w = wins[id]?.el; if (!w) return;
  if (w.dataset.mx) {
    w.style.left = w.dataset.ox; w.style.top = w.dataset.oy;
    w.style.width = w.dataset.ow; w.style.height = w.dataset.oh;
    delete w.dataset.mx;
  } else {
    w.dataset.ox = w.style.left; w.dataset.oy = w.style.top;
    w.dataset.ow = w.style.width; w.dataset.oh = w.style.height;
    w.style.left='0'; w.style.top='0'; w.style.width='100%'; w.style.height='100%';
    w.dataset.mx = '1';
  }
}
function focusWin(id) {
  Object.entries(wins).forEach(([k, v]) => {
    const inner = v.el.querySelector('.win-tb-inner');
    if (inner) inner.style.background = k === id ? '#dd6adf' : '#b8a0ba';
  });
  if (wins[id]) wins[id].el.style.zIndex = ++zTop;
  updateTB();
}
function openAllWins()  { Object.keys(SEC).forEach((k,i) => setTimeout(() => openWin(k), i*80)); }
function closeAllWins() { Object.keys(wins).forEach(closeWin); }
function tileWins() {
  const ks = Object.keys(wins); if (!ks.length) return;
  const cols = Math.ceil(Math.sqrt(ks.length));
  const rows = Math.ceil(ks.length / cols);
  const dw = document.getElementById('desktop').clientWidth;
  const dh = document.getElementById('desktop').clientHeight;
  ks.forEach((k,i) => {
    const w = wins[k].el;
    w.classList.remove('minimized');
    w.style.left   = ((i%cols) * Math.floor(dw/cols)) + 'px';
    w.style.top    = (Math.floor(i/cols) * Math.floor(dh/rows)) + 'px';
    w.style.width  = Math.floor(dw/cols) + 'px';
    w.style.height = Math.floor(dh/rows) + 'px';
    delete w.dataset.mx;
  });
}

// ═══════════════════════════════════════════
// TASKBAR
// ═══════════════════════════════════════════
function updateTB() {
  const bar = document.getElementById('tbApps');
  bar.innerHTML = '';
  Object.entries(wins).forEach(([id, rec]) => {
    const sec = SEC[id];
    const icon = sec ? sec.icon : '📅';
    const label = sec ? sec.label : 'My Dates';
    const focused = +rec.el.style.zIndex === zTop;
    const btn = document.createElement('div');
    btn.className = 'tb-btn' + (focused ? ' active' : '');
    btn.innerHTML = `<span class="fi">${icon}</span>${label}`;
    btn.onclick = () => {
      if (rec.el.classList.contains('minimized')) { rec.el.classList.remove('minimized'); focusWin(id); }
      else if (focused) minWin(id);
      else focusWin(id);
    };
    bar.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════
function makeDrag(win, handle) {
  let sx, sy, sl, st;
  handle.addEventListener('mousedown', e => {
    if (e.target.closest('.win-ctrls') || win.dataset.mx) return;
    // Avoid left/right or top/bottom conflicts for absolutely-positioned widgets.
    if (win.id === 'colour-widget') {
      const r = win.getBoundingClientRect();
      win.style.left = r.left + 'px';
      win.style.top = r.top + 'px';
      win.style.right = 'auto';
      win.style.bottom = 'auto';
    }
    sx = e.clientX; sy = e.clientY;
    sl = parseInt(win.style.left)||0; st = parseInt(win.style.top)||0;
    const mv = e2 => {
      win.style.left = Math.max(0, sl + e2.clientX - sx) + 'px';
      win.style.top  = Math.max(0, st + e2.clientY - sy) + 'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', () => document.removeEventListener('mousemove', mv), {once:true});
  });
}

// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════
function makeResize(win, handle) {
  handle.addEventListener('mousedown', e => {
    e.stopPropagation();
    const sx = e.clientX, sy = e.clientY;
    const sw = win.offsetWidth, sh = win.offsetHeight;
    const mv = e2 => {
      win.style.width  = Math.max(340, sw + e2.clientX - sx) + 'px';
      win.style.height = Math.max(220, sh + e2.clientY - sy) + 'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', () => document.removeEventListener('mousemove', mv), {once:true});
  });
}

// ═══════════════════════════════════════════
// DRAGGABLE DESKTOP ICONS
// ═══════════════════════════════════════════
function selIcon(el) {
  document.querySelectorAll('.desk-icon').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}
function clearSel(e) {
  if (!e.target.closest('.desk-icon'))
    document.querySelectorAll('.desk-icon').forEach(d => d.classList.remove('selected'));
}

function makeIconDraggable(icon) {
  let dragging = false;
  let moved = false;
  let sx, sy, sl, st;

  icon.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    moved = false; dragging = false;
    sx = e.clientX; sy = e.clientY;
    sl = parseInt(icon.style.left) || 0;
    st = parseInt(icon.style.top)  || 0;
    selIcon(icon);

    const onMove = e2 => {
      const dx = e2.clientX - sx;
      const dy = e2.clientY - sy;
      if (Math.hypot(dx, dy) < 6) return; // threshold before drag starts
      if (!dragging) {
        dragging = true;
        moved = true;
        icon.classList.add('dragging');
        icon.style.zIndex = 8000;
      }
      const desk = document.getElementById('desktop');
      icon.style.left = Math.max(0, Math.min(desk.clientWidth  - icon.offsetWidth,  sl + dx)) + 'px';
      icon.style.top  = Math.max(0, Math.min(desk.clientHeight - icon.offsetHeight, st + dy)) + 'px';
    };

    const onUp = () => {
      if (dragging) {
        icon.classList.remove('dragging');
        icon.style.zIndex = '';
        dragging = false;
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Block dblclick ONLY when a real drag happened
  icon.addEventListener('dblclick', e => {
    if (moved) { moved = false; e.stopPropagation(); e.preventDefault(); }
  });
}

document.querySelectorAll('.desk-icon').forEach(makeIconDraggable);

// COLOUR SLIDER
// ═══════════════════════════════════════════
function applyHue(h) {
  const hue = Number(h);
  const accentSat = 70;
  // Keep white UI text readable even on bright hues (yellow/cyan).
  let accentLight = 65;
  while (accentLight > 28 && contrastWhiteOnHsl(hue, accentSat, accentLight) < 4.5) {
    accentLight -= 1;
  }

  const pink     = `hsl(${hue}, ${accentSat}%, ${accentLight}%)`;
  const pinkDark = `hsl(${hue}, 62%, ${Math.max(24, accentLight - 15)}%)`;
  const pinkInact= `hsl(${hue}, 25%, ${Math.min(70, accentLight + 6)}%)`;
  const root = document.documentElement.style;
  root.setProperty('--pink',         pink);
  root.setProperty('--pink-dark',    pinkDark);
  root.setProperty('--pink-inactive',pinkInact);

  // Update all live titlebar backgrounds
  document.querySelectorAll('.win-tb-inner:not(.inactive)').forEach(el => el.style.background = pink);
  document.querySelectorAll('.cw-tb').forEach(el => el.style.background = pink);
  document.getElementById('taskbar').style.background = pink;

  // Swatch
  document.getElementById('cw-swatch').style.background = pink;
}

function contrastWhiteOnHsl(h, s, l) {
  const [r, g, b] = hslToRgb(h, s, l);
  const lum = relativeLuminance(r, g, b);
  return 1.05 / (lum + 0.05); // white luminance is 1
}

function hslToRgb(h, s, l) {
  const sat = s / 100;
  const light = l / 100;
  const c = (1 - Math.abs(2 * light - 1)) * sat;
  const hp = ((h % 360) + 360) % 360 / 60;
  const x = c * (1 - Math.abs((hp % 2) - 1));
  let r1 = 0, g1 = 0, b1 = 0;

  if (hp >= 0 && hp < 1) [r1, g1, b1] = [c, x, 0];
  else if (hp < 2) [r1, g1, b1] = [x, c, 0];
  else if (hp < 3) [r1, g1, b1] = [0, c, x];
  else if (hp < 4) [r1, g1, b1] = [0, x, c];
  else if (hp < 5) [r1, g1, b1] = [x, 0, c];
  else [r1, g1, b1] = [c, 0, x];

  const m = light - c / 2;
  return [
    Math.round((r1 + m) * 255),
    Math.round((g1 + m) * 255),
    Math.round((b1 + m) * 255),
  ];
}

function relativeLuminance(r, g, b) {
  const toLinear = (v) => {
    const c = v / 255;
    return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  };
  const [rl, gl, bl] = [toLinear(r), toLinear(g), toLinear(b)];
  return 0.2126 * rl + 0.7152 * gl + 0.0722 * bl;
}

const hueSlider = document.getElementById('hue-slider');
applyHue(hueSlider.value); // init
hueSlider.addEventListener('input', e => applyHue(e.target.value));

// Normalize widget position once so dragging never stretches it.
const colourWidget = document.getElementById('colour-widget');
if (colourWidget) {
  const r = colourWidget.getBoundingClientRect();
  colourWidget.style.left = r.left + 'px';
  colourWidget.style.top = r.top + 'px';
  colourWidget.style.right = 'auto';
  colourWidget.style.bottom = 'auto';
}

// Make colour widget draggable
makeDrag(document.getElementById('colour-widget'), document.getElementById('cw-tb'));

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
// Marked dates: key = "YYYY-MM-DD", value = note string
const markedDates = {};

// Preset important dates
const PRESET = {
  '2026-01-05': 'Assignment begins',
  '2026-01-12': 'First journal entry',
  '2026-01-20': 'Figma auto-layout breakthrough',
  '2026-02-03': 'Badminton habit started',
  '2026-02-14': 'Orbit of 3 realisation',
  '2026-02-28': 'Waves on the Shore meditation',
  '2026-03-10': 'Physical rating hits 5/5',
  '2026-03-22': 'Social: new friends on trip',
  '2026-04-01': 'Khushi difficult month begins',
  '2026-04-15': 'Mind Creates Emotions insight',
  '2026-04-25': 'Assignment wraps up!',
};
Object.assign(markedDates, PRESET);

let calSelectedKey = null;  // currently clicked day key

function openCalendar() {
  const id = '__calendar__';
  if (wins[id]) { wins[id].el.classList.remove('minimized'); focusWin(id); return; }

  const off = Object.keys(wins).length;
  const win = document.createElement('div');
  win.className = 'os-window win-open-anim';
  win.style.cssText = `width:900px;height:480px;left:${80+off*28}px;top:${40+off*22}px;z-index:${++zTop}`;

  win.innerHTML = `
    <div class="win-tb">
      <div class="win-tb-inner" id="tb-inner-${id}">
        <span class="win-tb-title">📅 My Dates — Jan → Apr 2026</span>
        <div class="win-ctrls">
          <button class="wc-btn" onclick="minWin('${id}')">─</button>
          <button class="wc-btn" onclick="maxWin('${id}')">□</button>
          <button class="wc-btn" onclick="closeWin('${id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="cal-shell">
      <div class="cal-months" id="cal-months"></div>
      <div class="cal-notebar">
        <span class="cal-selected-info" id="cal-sel-info">Click a date to select it</span>
        <input type="text" id="cal-note-input" placeholder="Add a note…" disabled />
        <button onclick="saveCalNote('${id}')">Mark</button>
        <button onclick="clearCalNote('${id}')">Clear</button>
      </div>
    </div>
    <div class="win-status">
      <div class="status-pane">${Object.keys(markedDates).length} marked dates</div>
      <div class="status-pane">Jan – Apr 2026</div>
    </div>
    <div class="win-resize"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  wins[id] = { el: win };
  win.addEventListener('mousedown', () => focusWin(id));
  makeDrag(win, win.querySelector('.win-tb'));
  makeResize(win, win.querySelector('.win-resize'));
  setTimeout(() => win.classList.remove('win-open-anim'), 200);

  renderCalendar(id);
  updateTB();
}

function renderCalendar(id) {
  const container = document.getElementById('cal-months');
  if (!container) return;
  container.innerHTML = '';

  const months = [
    { year: 2026, month: 0, label: 'January 2026' },
    { year: 2026, month: 1, label: 'February 2026' },
    { year: 2026, month: 2, label: 'March 2026' },
    { year: 2026, month: 3, label: 'April 2026' },
  ];
  const today = new Date();
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  months.forEach(({ year, month, label }) => {
    const col = document.createElement('div');
    col.className = 'cal-month';

    const header = document.createElement('div');
    header.className = 'cal-month-header';
    header.textContent = label;

    const dowRow = document.createElement('div');
    dowRow.className = 'cal-dow-row';
    DOW.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-dow';
      cell.textContent = d;
      dowRow.appendChild(cell);
    });

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Empty cells before day 1
    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      grid.appendChild(e);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;
      cell.dataset.key = key;

      // Today highlight
      if (today.getFullYear()===year && today.getMonth()===month && today.getDate()===d)
        cell.classList.add('today');

      // Marked
      if (markedDates[key]) {
        cell.classList.add('marked');
        const tip = document.createElement('div');
        tip.className = 'cal-tip';
        tip.textContent = markedDates[key];
        cell.appendChild(tip);
      }

      cell.addEventListener('click', () => selectCalDay(id, key, cell));
      grid.appendChild(cell);
    }

    col.appendChild(header);
    col.appendChild(dowRow);
    col.appendChild(grid);
    container.appendChild(col);
  });
}

function selectCalDay(id, key, cell) {
  // Deselect previous
  document.querySelectorAll('.cal-day.selected-day').forEach(el => el.classList.remove('selected-day'));
  calSelectedKey = key;
  cell.classList.add('selected-day');

  const info = document.getElementById('cal-sel-info');
  const input = document.getElementById('cal-note-input');
  if (info) info.textContent = key;
  if (input) {
    input.disabled = false;
    input.value = markedDates[key] || '';
    input.focus();
  }
}

function saveCalNote(id) {
  if (!calSelectedKey) return;
  const input = document.getElementById('cal-note-input');
  const note = input ? input.value.trim() : '';
  if (note) {
    markedDates[calSelectedKey] = note;
  } else {
    delete markedDates[calSelectedKey];
  }
  renderCalendar(id);
  updateCalStatus(id);
}

function clearCalNote(id) {
  if (!calSelectedKey) return;
  delete markedDates[calSelectedKey];
  const input = document.getElementById('cal-note-input');
  if (input) input.value = '';
  renderCalendar(id);
  updateCalStatus(id);
}

function updateCalStatus(id) {
  const bar = wins[id]?.el?.querySelector('.win-status .status-pane');
  if (bar) bar.textContent = Object.keys(markedDates).length + ' marked dates';
}

// Calendar icon drag handled by makeIconDraggable above
